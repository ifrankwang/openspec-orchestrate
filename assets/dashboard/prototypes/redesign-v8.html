<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编排进度看板 · 重设计 v8 多模式对比</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#f8fafc;--surface:#fff;--surface-2:#f1f5f9;
  --ink:#0f172a;--muted:#475569;--quiet:#94a3b8;
  --line:#e2e8f0;--line-2:#cbd5e1;
  --blue:#2563eb;--blue-soft:#eff6ff;
  --green:#16a34a;--green-soft:#f0fdf4;
  --amber:#d97706;--amber-soft:#fffbeb;
  --red:#dc2626;--red-soft:#fef2f2;
  --violet:#7c3aed;--violet-soft:#f5f3ff;
  --teal:#0d9488;--teal-soft:#f0fdfa;
  --radius:12px;--radius-sm:8px;--pill:999px;
  --shadow:0 1px 2px rgba(15,23,42,.04),0 6px 16px rgba(15,23,42,.04);
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}html{font-size:15px}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer}button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.shell{max-width:1280px;margin:0 auto;padding:32px 28px 80px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding-bottom:26px;border-bottom:1px solid var(--line)}
.brand{display:flex;flex-direction:column;gap:8px}
.badge{display:inline-flex;align-items:center;gap:8px;font:600 .68rem/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-soft)}
h1{margin:0;font-size:1.6rem;font-weight:700;letter-spacing:-.03em}
.meta{display:flex;gap:28px;text-align:right;font-size:.8rem;color:var(--muted)}
.meta span{display:flex;flex-direction:column;gap:5px}.meta strong{color:var(--ink);font-weight:600}
.group-strip{display:flex;gap:8px;overflow-x:auto;padding:20px 2px 24px}
.group-tab{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:10px 16px;border:1px solid var(--line);border-radius:var(--pill);background:var(--surface);color:var(--muted);font-size:.84rem;transition:.15s}
.group-tab:hover{border-color:var(--line-2);color:var(--ink)}
.group-tab[aria-selected="true"]{border-color:transparent;background:var(--ink);color:#fff;box-shadow:var(--shadow)}
.group-tab .num{font-family:var(--mono);font-size:.72rem;opacity:.7}
/* review section */
.review-section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px 24px;margin-bottom:20px}
.review-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.review-title{margin:0;font-size:1.05rem;font-weight:700}
.review-status{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--pill);font-size:.8rem;font-weight:600}
.review-status.passed{background:var(--green-soft);color:var(--green)}.review-status.failed{background:var(--red-soft);color:var(--red)}.review-status.pending{background:var(--amber-soft);color:var(--amber)}
.review-status::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor}
.review-flow{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface-2);border-radius:var(--radius);margin-bottom:14px;overflow-x:auto}
.review-flow-line{flex:1;height:2px;background:var(--line);border-radius:var(--pill);min-width:20px}
.review-flow-step{display:flex;align-items:center;gap:8px;flex-shrink:0}
.review-flow-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid var(--line);color:var(--muted);font-size:.75rem;font-weight:700}
.review-flow-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.review-flow-dot.failed{background:var(--red);border-color:var(--red);color:#fff}
.review-flow-dot.pending{background:#fff;border-color:var(--line-2);color:var(--muted)}
.review-flow-name{font-weight:600;font-size:.85rem;white-space:nowrap}
.mode-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--quiet);margin-bottom:10px}
/* mode A: icon pills */
.quality-pills{display:flex;flex-wrap:wrap;gap:6px}
.quality-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--pill);background:#fff;border:1px solid var(--line);font-size:.78rem}
.quality-pill .status-icon{width:12px;height:12px;display:inline-flex;align-items:center;justify-content:center;font-size:9px}
.quality-pill.passed .status-icon{color:var(--green)}.quality-pill.failed .status-icon{color:var(--red)}.quality-pill.pending .status-icon{color:var(--amber)}
/* mode B: bars */
.quality-bars{display:flex;flex-direction:column;gap:8px}
.quality-bar-row{display:flex;align-items:center;gap:10px;font-size:.82rem}
.quality-bar-label{width:60px;font-weight:500}
.quality-bar-track{flex:1;height:8px;background:var(--line);border-radius:var(--pill);overflow:hidden}
.quality-bar-fill{height:100%;border-radius:var(--pill);transition:width .3s}
.quality-bar-fill.passed{background:var(--green);width:100%}.quality-bar-fill.failed{background:var(--red);width:100%}.quality-bar-fill.pending{background:var(--amber);width:30%}
.quality-bar-status{width:44px;font-size:.74rem;color:var(--muted);text-align:right}
/* mode C: radar */
.radar-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.radar-svg{width:160px;height:160px}
.radar-legend{display:flex;flex-direction:column;gap:6px}
.radar-legend-item{display:flex;align-items:center;gap:8px;font-size:.8rem}
.radar-legend-item::before{content:"";width:10px;height:10px;border-radius:50%}
.radar-legend-item.passed::before{background:var(--green)}.radar-legend-item.failed::before{background:var(--red)}.radar-legend-item.pending::before{background:var(--amber)}
/* mode D: score cards */
.quality-score-top{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.quality-score-big{font:700 2rem/1 var(--mono);color:var(--red)}
.quality-score-big.passed{color:var(--green)}.quality-score-big.pending{color:var(--amber)}
.quality-score-label{font-size:.8rem;color:var(--muted)}
.quality-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.quality-card{display:flex;flex-direction:column;gap:6px;padding:12px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;text-align:center}
.quality-card.passed{border-top:4px solid var(--green)}.quality-card.failed{border-top:4px solid var(--red)}.quality-card.pending{border-top:4px solid var(--amber)}
.quality-card-name{font-size:.8rem;font-weight:600}.quality-card-status{font-size:.72rem;color:var(--muted)}
@media(max-width:760px){.quality-cards{grid-template-columns:repeat(3,1fr)}.radar-wrap{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="badge"><span>实时同步</span></div>
      <h1>编排进度看板 · 多模式对比</h1>
    </div>
  </header>
  <nav class="group-strip" id="groupList"></nav>
  <main id="dashboard"></main>
</div>
<script>
const DIM_LABELS={style:'风格',architecture:'架构',performance:'性能',security:'安全',maintainability:'可维护'};
const DIM_COLOR={style:'#2563eb',architecture:'#7c3aed',performance:'#d97706',security:'#dc2626',maintainability:'#0d9488'};
const mockQP={style:'pending',architecture:'passed',performance:'pending',security:'failed',maintainability:'passed'};
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c]))}
function cls(v){return String(v??'').replace(/[^a-zA-Z0-9_-]/g,'_')}
function statusIcon(v){return v==='passed'?'✓':v==='failed'?'✕':'●'}
const statusText={passed:'已通过',failed:'未通过',pending:'待审核'}
function renderModeA(qp){return `<div class="mode-label">模式 A · 图标标签</div><div class="quality-pills">${Object.entries(qp).map(([d,v])=>`<div class="quality-pill ${v}"><span class="status-icon">${statusIcon(v)}</span><span>${DIM_LABELS[d]}</span></div>`).join('')}</div>`}
function renderModeB(qp){return `<div class="mode-label">模式 B · 状态条</div><div class="quality-bars">${Object.entries(qp).map(([d,v])=>`<div class="quality-bar-row"><span class="quality-bar-label">${DIM_LABELS[d]}</span><div class="quality-bar-track"><div class="quality-bar-fill ${v}"></div></div><span class="quality-bar-status">${statusText[v]}</span></div>`).join('')}</div>`}
function renderModeC(qp){const entries=Object.entries(qp);const r=60;const cx=80;const cy=80;const angle=i=>-Math.PI/2+(2*Math.PI*i/entries.length);let points='';const dots='';const legend='';const poly=entries.map(([d,v],i)=>{const a=angle(i);const x=cx+r*Math.cos(a);const y=cy+r*Math.sin(a);return `${x},${y}`}).join(' ');return `<div class="mode-label">模式 C · 雷达图</div><div class="radar-wrap"><svg class="radar-svg" viewBox="0 0 160 160"><polygon points="${poly}" fill="rgba(220,38,38,.15)" stroke="var(--red)" stroke-width="2"/>${entries.map(([d,v],i)=>{const a=angle(i);const x=cx+r*Math.cos(a);const y=cy+r*Math.sin(a);return `<circle cx="${x}" cy="${y}" r="4" fill="${v==='passed'?'var(--green)':v==='failed'?'var(--red)':'var(--amber)'}"/>`}).join('')}</svg><div class="radar-legend">${entries.map(([d,v])=>`<div class="radar-legend-item ${v}">${DIM_LABELS[d]} · ${statusText[v]}</div>`).join('')}</div></div>`}
function renderModeD(qp){const total=Object.keys(qp).length;const passed=Object.values(qp).filter(v=>v==='passed').length;const failed=Object.values(qp).filter(v=>v==='failed').length;const pending=total-passed-failed;const scoreText=failed>0?'未通过':pending>0?'审核中':'已通过';const cls=failed>0?'failed':pending>0?'pending':'passed';return `<div class="mode-label">模式 D · 总分 + 卡片</div><div class="quality-score-top"><div class="quality-score-big ${cls}">${passed}/${total}</div><div class="quality-score-label">通过维度数<br>${scoreText}</div></div><div class="quality-cards">${Object.entries(qp).map(([d,v])=>`<div class="quality-card ${v}"><div class="quality-card-name">${DIM_LABELS[d]}</div><div class="quality-card-status">${statusText[v]}</div></div>`).join('')}</div>`}
function renderReviewSection(mode,title,renderFn){return `<section class="review-section"><div class="review-head"><h2 class="review-title">${title}</h2><span class="review-status failed">存在未通过门禁</span></div><div class="review-flow"><div class="review-flow-step"><div class="review-flow-dot pending">●</div><span class="review-flow-name">Tool Review</span></div><div class="review-flow-line"></div><div class="review-flow-step"><div class="review-flow-dot pending">●</div><span class="review-flow-name">Task Review</span></div><div class="review-flow-line"></div><div class="review-flow-step"><div class="review-flow-dot failed">✕</div><span class="review-flow-name">Quality Review</span></div></div>${renderFn(mockQP)}</section>`}
function render(){document.getElementById('dashboard').innerHTML=`${renderReviewSection('A','审查阶段 · 模式 A',renderModeA)}${renderReviewSection('B','审查阶段 · 模式 B',renderModeB)}${renderReviewSection('C','审查阶段 · 模式 C',renderModeC)}${renderReviewSection('D','审查阶段 · 模式 D',renderModeD)}`}
render();
</script>
</body>
</html>
