<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编排进度看板 · Bento 卡片</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#f7f8fb;--surface:#ffffff;--elevated:#ffffff;
  --ink:#0b0f19;--muted:#5f6675;--quiet:#9ba3b2;
  --line:#e6e8ef;--line-subtle:#f1f3f8;
  --blue:#2563eb;--blue-soft:#eff4ff;
  --green:#10b981;--green-soft:#e8fbf3;
  --amber:#f59e0b;--amber-soft:#fff8e6;
  --red:#ef4444;--red-soft:#fff0f0;
  --violet:#8b5cf6;--violet-soft:#f3f0ff;
  --teal:#14b8a6;--teal-soft:#e7fcf9;
  --radius:22px;--radius-sm:12px;
  --shadow:0 4px 18px rgba(11,15,25,.06);
  --font-sans:'Fira Sans',system-ui,sans-serif;
  --font-mono:'Fira Code',ui-monospace,monospace;
}
*{box-sizing:border-box}html{font-size:15px}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);line-height:1.55;-webkit-font-smoothing:antialiased}
button{font:inherit}button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.shell{max-width:1200px;margin:0 auto;padding:36px 24px 80px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding-bottom:24px}
.brand{display:flex;flex-direction:column;gap:8px}
.badge{display:inline-flex;align-items:center;gap:8px;font:600 .7rem/1 var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-soft)}
h1{margin:0;font-size:1.8rem;font-weight:600;letter-spacing:-.04em}
.meta{display:flex;gap:24px;text-align:right;font-size:.8rem;color:var(--muted)}
.meta span{display:flex;flex-direction:column;gap:5px}.meta strong{color:var(--ink);font-weight:600}
.group-strip{display:flex;gap:8px;overflow-x:auto;padding:6px 2px 20px}
.group-pill{flex:0 0 auto;padding:9px 16px;border:1px solid var(--line);border-radius:999px;background:var(--surface);color:var(--muted);font-size:.82rem;cursor:pointer;transition:.15s ease}
.group-pill:hover{border-color:var(--blue);color:var(--ink)}
.group-pill[aria-selected="true"]{border-color:transparent;background:var(--ink);color:#fff;box-shadow:var(--shadow)}
.group-pill .num{font-family:var(--font-mono);font-size:.72rem;opacity:.7}
.bento{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;align-items:start;margin-bottom:24px}
.bcard{display:flex;flex-direction:column;gap:12px;padding:22px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);transition:transform .15s}
.bcard:hover{transform:translateY(-2px)}
.bcard.span2{grid-column:span 2}.bcard.span4{grid-column:span 4}
.bcard h3{margin:0;font-size:1rem;font-weight:600;display:flex;align-items:center;gap:10px}
.bcard h3 .dot{width:10px;height:10px;border-radius:50%}
.bcard .big{font:600 2rem/1 var(--font-mono);letter-spacing:-.03em}
.bcard .sub{color:var(--muted);font-size:.82rem}
.stage-bars{display:flex;gap:8px;margin-top:4px}
.stage-bar{flex:1;display:flex;flex-direction:column;gap:8px}
.stage-bar .fill{height:8px;border-radius:999px;background:var(--line-subtle)}
.stage-bar .fill.done{background:var(--green)}.stage-bar .fill.active{background:var(--blue)}
.stage-bar .label{font:.72rem var(--font-mono);color:var(--muted)}
.quality-bubbles{display:flex;gap:8px;flex-wrap:wrap}
.quality-bubble{display:flex;flex-direction:column;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:var(--line-subtle);font:.7rem var(--font-mono);color:var(--muted);gap:3px}
.quality-bubble.passed{background:var(--green-soft);color:var(--green)}.quality-bubble.failed{background:var(--red-soft);color:var(--red)}.quality-bubble.pending{background:var(--amber-soft);color:var(--amber)}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)}
.panel-head h3{margin:0;font-size:1rem;font-weight:600}.panel-head p{margin:4px 0 0;font-size:.78rem;color:var(--muted)}
.count{font:600 .8rem/1 var(--font-mono);padding:5px 10px;background:var(--line-subtle);border-radius:999px;color:var(--muted)}
.panel-body{padding:12px 20px 20px}
.empty{padding:30px 0;text-align:center;color:var(--quiet);font-size:.85rem}
.task,.item{padding:14px 0;border-bottom:1px solid var(--line-subtle)}
.task:last-child,.item:last-child{border-bottom:0}
.task-id{font:.74rem/1.4 var(--font-mono);color:var(--quiet);margin-bottom:6px}
.task-title{font-weight:500;margin-bottom:4px}
.task-trace{font-size:.8rem;color:var(--muted);margin-bottom:10px}
.item-id{font:.74rem/1.5 var(--font-mono);color:var(--quiet);margin-bottom:6px}
.item-title{font-size:.9rem;font-weight:500;line-height:1.45;margin-bottom:10px}
.item-note{font-size:.8rem;color:var(--muted);margin-bottom:8px}
.item-meta{display:flex;gap:6px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font:500 .72rem/1.4 var(--font-mono)}
.tag.open,.tag.submitted,.tag.awaiting_user,.tag.ready_for_architect,.tag.pending{background:var(--blue-soft);color:var(--blue)}
.tag.completed,.tag.verified,.tag.resolved,.tag.passed{background:var(--green-soft);color:var(--green)}
.tag.rejected,.tag.failed,.tag.critical{background:var(--red-soft);color:var(--red)}
.tag.exemption_requested,.tag.exempted,.tag.medium{background:var(--amber-soft);color:var(--amber)}
.tag.low,.tag.info{background:var(--violet-soft);color:var(--violet)}
@media(max-width:980px){.bento{grid-template-columns:repeat(2,1fr)}.bcard.span2,.bcard.span4{grid-column:span 2}.board{grid-template-columns:1fr}}
@media(max-width:640px){.bento{grid-template-columns:1fr}.bcard.span2,.bcard.span4{grid-column:span 1}.topbar{flex-direction:column;gap:14px}.meta{text-align:left}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="badge">实时同步</div>
      <h1>编排进度看板</h1>
    </div>
    <div class="meta">
      <span>变更编号<strong id="changeId">-</strong></span>
      <span>基准分支<strong id="baseBranch">-</strong></span>
      <span>最后更新<strong id="updatedAt">-</strong></span>
    </div>
  </header>
  <nav class="group-strip" id="groupList"></nav>
  <main id="dashboard"></main>
</div>
<script>
const PHASES=[['task_analysis','需求分析'],['dev_impl','开发实施'],['review','审查'],['completed','完成']];
const TASK_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证'};
const ISSUE_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证',exemption_requested:'豁免申请',exempted:'已豁免'};
const BLOCKER_LABELS={reported:'已上报',awaiting_user:'等待用户',ready_for_architect:'等待架构复核',resolved:'已解决'};
const DIM_LABELS={style:'风格',architecture:'架构',performance:'性能',security:'安全',maintainability:'可维护'};
const SEVERITY_LABELS={Critical:'严重',High:'高危',Medium:'中危',Low:'低危',Info:'提示'};
const SEVERITY_ORDER={Critical:0,High:1,Medium:2,Low:3,Info:4};
const mockState={
  active:true,changeId:'proto-001',baseBranch:'main',updatedAt:new Date().toISOString(),
  taskGroups:[
    {id:'tg-1',name:'用户登录',status:'dev_impl',lifecycle:'in_progress',reviewCompleted:false,branchName:'task-group/user-login',
     phases:{architect_review:{completed:true},review:{tool:{completed:false},task:{completed:false},quality:{progress:{style:'pending',architecture:'passed',performance:'pending',security:'failed',maintainability:'passed'}}}},
     tasks:[
       {id:'1',title:'登录接口',taskNumber:'1.1',specTrace:'spec.md',status:'open',rejectReason:null},
       {id:'2',title:'单元测试',taskNumber:'1.2',specTrace:'spec.md',status:'verified',rejectReason:null},
     ],
     issues:[
       {id:'10',dimension:'security',severity:'Critical',file:'Auth.java',line:12,description:'SQL 注入风险，需改用参数化查询',status:'open',sourcePhase:'quality'},
       {id:'11',dimension:'style',severity:'Info',file:'Config.java',line:3,description:'命名风格不一致',status:'verified',sourcePhase:'tool'},
     ],
     blockers:[{id:'b1',taskId:'1',description:'依赖服务不可用',evidence:'HTTP 503',status:'awaiting_user'}]
    },
    {id:'tg-2',name:'订单支付',status:'completed',lifecycle:'completed',reviewCompleted:true,branchName:'task-group/order-pay',
     phases:{architect_review:{completed:true},review:{tool:{completed:true},task:{completed:true},quality:{progress:{style:'passed',architecture:'passed',performance:'passed',security:'passed',maintainability:'passed'}}}},
     tasks:[{id:'3',title:'支付流程',taskNumber:'2.1',specTrace:'spec.md',status:'verified',rejectReason:null}],
     issues:[],blockers:[]
    }
  ]
};
let selectedGroupId=mockState.taskGroups[0].id;
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c]))}
function cls(v){return String(v??'').replace(/[^a-zA-Z0-9_-]/g,'_')}
function tag(value,label){return `<span class="tag ${cls(value)}">${esc(label||value)}</span>`}
function currentGroup(){return mockState.taskGroups.find(g=>g.id===selectedGroupId)||mockState.taskGroups[0]}
function phaseState(group,key,index){const current=PHASES.findIndex(p=>p[0]===group.status);if(key==='task_analysis')return group.phases.architect_review.completed?'done':current===index?'active':'pending';if(key==='dev_impl')return group.status==='review'||group.status==='completed'?'done':current===index?'active':'pending';if(key==='review')return group.reviewCompleted?'done':current===index?'active':'pending';return group.status==='completed'?'done':'pending'}
function renderGroups(){const el=document.getElementById('groupList');el.innerHTML=mockState.taskGroups.map(g=>`<button class="group-pill" data-gid="${esc(g.id)}" aria-selected="${g.id===selectedGroupId}"><span class="num">#${esc(g.id)}</span><span>${esc(g.name)}</span>${tag(g.lifecycle,g.status)}</button>`).join('')}
function renderBento(g){const tasks=g.tasks||[],issues=g.issues||[],blockers=g.blockers||[];const verified=tasks.filter(t=>t.status==='verified').length;const unresolved=issues.filter(i=>!['verified','exempted'].includes(i.status)).length;const waiting=blockers.filter(b=>b.status==='awaiting_user').length;const r=g.phases.review;const q=Object.entries(r.quality.progress).map(([d,v])=>`<div class="quality-bubble ${v}">${v==='passed'?'✓':v==='failed'?'✕':'•'}<span>${DIM_LABELS[d]}</span></div>`).join('');return `<div class="bcard span2"><h3><span class="dot" style="background:var(--blue)"></span>当前任务组</h3><div class="big">${esc(g.name)}</div><div class="sub">${esc(g.branchName||'尚未设置隔离分支')} · #${esc(g.id)} · ${esc(g.lifecycle)}</div></div><div class="bcard"><h3>Task 已验证</h3><div class="big" style="color:var(--green)">${verified}/${tasks.length}</div><div class="sub">${tasks.length-verified} 待验证</div></div><div class="bcard"><h3>待处理 Issue</h3><div class="big" style="color:${unresolved?'var(--red)':'var(--green)'}">${unresolved}</div><div class="sub">等待用户 ${waiting}</div></div><div class="bcard span2"><h3>阶段进度</h3><div class="stage-bars">${PHASES.map(([k,l],i)=>{const s=phaseState(g,k,i);return `<div class="stage-bar"><div class="fill ${s==='done'||s==='active'?s:''}"></div><div class="label">${l}</div></div>`}).join('')}</div></div><div class="bcard span2"><h3>Quality Review</h3><div class="quality-bubbles">${q}</div></div>`}
function panel(title,subtitle,count,content){return `<section class="panel"><header class="panel-head"><div><h3>${title}</h3><p>${subtitle}</p></div><span class="count">${count}</span></header><div class="panel-body">${content}</div></section>`}
function renderTasks(tasks){return panel('Task','实施任务',tasks.length,tasks.length?tasks.map(t=>`<article class="task"><div class="task-id">#${esc(t.id)} · ${esc(t.taskNumber)}</div><div class="task-title">${esc(t.title)}</div><div class="task-trace">${esc(t.specTrace||'无 Spec 溯源')}${t.rejectReason?' · 驳回：'+esc(t.rejectReason):''}</div><div class="item-meta">${tag(t.status,TASK_LABELS[t.status])}</div></article>`).join(''):'<div class="empty">无 Task</div>')}
function renderIssues(issues){const sorted=[...issues].sort((a,b)=>SEVERITY_ORDER[a.severity]-SEVERITY_ORDER[b.severity]);return panel('Issue','审查发现',issues.length,sorted.length?sorted.map(i=>`<article class="item"><div class="item-id">#${esc(i.id)} · ${esc(i.file)}${i.line?':'+i.line:''}</div><div class="item-title">${esc(i.description)}</div><div class="item-meta">${tag(String(i.severity).toLowerCase(),SEVERITY_LABELS[i.severity]||i.severity)}${tag(i.dimension,DIM_LABELS[i.dimension]||i.dimension)}${tag(i.status,ISSUE_LABELS[i.status])}</div></article>`).join(''):'<div class="empty">无 Issue</div>')}
function renderBlockers(blockers){return panel('Blocker','待外部处理',blockers.length,blockers.length?blockers.map(b=>`<article class="item"><div class="item-id">#${esc(b.id)}${b.taskId?' · TASK #'+esc(b.taskId):''}</div><div class="item-title">${esc(b.description)}</div><div class="item-note">${esc(b.evidence)}</div><div class="item-meta">${tag(b.status,BLOCKER_LABELS[b.status])}</div></article>`).join(''):'<div class="empty">无待处理 Blocker</div>')}
function render(){const g=currentGroup();document.getElementById('changeId').textContent=mockState.changeId;document.getElementById('baseBranch').textContent=mockState.baseBranch||'-';document.getElementById('updatedAt').textContent=mockState.updatedAt?new Date(mockState.updatedAt).toLocaleTimeString():'-';document.getElementById('dashboard').innerHTML=`<section class="bento">${renderBento(g)}</section><section class="board">${renderTasks(g.tasks)}${renderIssues(g.issues)}${renderBlockers(g.blockers)}</section>`}
renderGroups();render();
document.getElementById('groupList').addEventListener('click',e=>{const b=e.target.closest('[data-gid]');if(b){selectedGroupId=b.dataset.gid;renderGroups();render()}});
</script>
</body>
</html>
