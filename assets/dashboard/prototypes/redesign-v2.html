<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编排进度看板 · 重设计 v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#f8fafc;--surface:#fff;--surface-2:#f1f5f9;
  --ink:#0f172a;--muted:#475569;--quiet:#94a3b8;
  --line:#e2e8f0;--line-2:#cbd5e1;
  --blue:#2563eb;--blue-soft:#eff6ff;
  --green:#16a34a;--green-soft:#f0fdf4;
  --amber:#d97706;--amber-soft:#fffbeb;
  --red:#dc2626;--red-soft:#fef2f2;
  --violet:#7c3aed;--violet-soft:#f5f3ff;
  --teal:#0d9488;--teal-soft:#f0fdfa;
  --radius:12px;--radius-sm:8px;--pill:999px;
  --shadow:0 1px 2px rgba(15,23,42,.04),0 6px 16px rgba(15,23,42,.04);
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}html{font-size:15px}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer}button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.icon{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center}
.shell{max-width:1280px;margin:0 auto;padding:32px 28px 80px}
/* header */
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding-bottom:26px;border-bottom:1px solid var(--line)}
.brand{display:flex;flex-direction:column;gap:8px}
.badge{display:inline-flex;align-items:center;gap:8px;font:600 .68rem/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-soft)}
h1{margin:0;font-size:1.6rem;font-weight:700;letter-spacing:-.03em}
.meta{display:flex;gap:28px;text-align:right;font-size:.8rem;color:var(--muted)}
.meta span{display:flex;flex-direction:column;gap:5px}.meta strong{color:var(--ink);font-weight:600}
/* group tabs */
.group-strip{display:flex;gap:8px;overflow-x:auto;padding:20px 2px 24px}
.group-tab{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:10px 16px;border:1px solid var(--line);border-radius:var(--pill);background:var(--surface);color:var(--muted);font-size:.84rem;transition:.15s}
.group-tab:hover{border-color:var(--line-2);color:var(--ink)}
.group-tab[aria-selected="true"]{border-color:transparent;background:var(--ink);color:#fff;box-shadow:var(--shadow)}
.group-tab .num{font-family:var(--mono);font-size:.72rem;opacity:.7}
/* stepper */
.stepper{display:flex;align-items:flex-start;position:relative;padding:24px 20px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px}
.stepper-line{position:absolute;top:38px;left:80px;right:80px;height:3px;background:var(--line);border-radius:var(--pill);z-index:0}
.step{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:1;text-align:center}
.step-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 .8rem var(--mono);background:#fff;border:2px solid var(--line);color:var(--muted)}
.step.done .step-dot{background:var(--green);border-color:var(--green);color:#fff}
.step.active .step-dot{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 0 4px var(--blue-soft)}
.step-label{font-weight:700;font-size:.85rem}.step-desc{font-size:.75rem;color:var(--muted);max-width:130px;line-height:1.35}
/* review gates as flow */
.review-section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:20px}
.review-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.review-title{margin:0;font-size:1.05rem;font-weight:700}.review-sub{margin:4px 0 0;font-size:.8rem;color:var(--muted)}
.quality-summary{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface-2);border-radius:var(--radius-sm);font-size:.82rem}
.quality-summary .dot{width:8px;height:8px;border-radius:50%}
.quality-summary.passed .dot{background:var(--green)}.quality-summary.failed .dot{background:var(--red)}.quality-summary.pending .dot{background:var(--amber)}
.flow{display:flex;align-items:stretch;gap:12px}
.flow-step{flex:1;display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface-2);position:relative}
.flow-step.done{border-color:var(--green);background:var(--green-soft)}
.flow-step.failed{border-color:var(--red);background:var(--red-soft)}
.flow-step.active{border-color:var(--blue);background:var(--blue-soft);box-shadow:0 0 0 1px var(--blue) inset}
.flow-step.pending{opacity:.85}
.flow-icon{width:32px;height:32px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.flow-step.done .flow-icon{color:var(--green)}.flow-step.failed .flow-icon{color:var(--red)}.flow-step.active .flow-icon{color:var(--blue)}.flow-step.pending .flow-icon{color:var(--amber)}
.flow-body{flex:1;min-width:0}
.flow-name{font-weight:700;font-size:.9rem;margin-bottom:3px}.flow-desc{font-size:.75rem;color:var(--muted);line-height:1.4}
.flow-arrow{color:var(--line);font-size:1.4rem;font-weight:300;line-height:1}
/* boards */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)}
.panel-head h3{margin:0;font-size:1rem;font-weight:700}.panel-head p{margin:4px 0 0;font-size:.78rem;color:var(--muted)}
.count{font:600 .78rem/1 var(--mono);padding:4px 10px;background:var(--surface-2);border-radius:var(--pill);color:var(--muted)}
/* filter tabs */
.filter-bar{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--surface-2);overflow-x:auto;flex-wrap:wrap;align-items:center}
.filter-label{font-size:.75rem;color:var(--muted);margin-right:4px}
.filter-pill{padding:5px 10px;border:1px solid var(--line);border-radius:var(--pill);background:#fff;color:var(--muted);font-size:.76rem;white-space:nowrap;transition:.12s}
.filter-pill:hover{border-color:var(--line-2)}.filter-pill.active{border-color:var(--ink);background:var(--ink);color:#fff}
.filter-pill.clear{border-color:transparent;background:transparent;color:var(--blue)}
/* list items */
.panel-body{max-height:540px;overflow:auto;padding:0 16px}
.empty{padding:28px 0;text-align:center;color:var(--quiet);font-size:.85rem}
.item{padding:14px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:0}
.item-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:6px}
.item-id{font:.72rem/1.5 var(--mono);color:var(--quiet);padding-top:3px}
.item-title{font-size:.94rem;font-weight:600;line-height:1.45}
.item-desc{font-size:.82rem;color:var(--muted);margin-top:6px;line-height:1.5}
.item-desc.collapsed{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-desc-toggle{margin-top:6px;font-size:.75rem;color:var(--blue);background:none;border:none;padding:0;cursor:pointer}
.item-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center}
/* status badge: solid with dot */
.badge-status{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--pill);font:600 .74rem/1.4 var(--mono)}
.badge-status::before{content:"";width:6px;height:6px;border-radius:50%}
.badge-status.open,.badge-status.submitted,.badge-status.awaiting_user,.badge-status.ready_for_architect,.badge-status.pending{background:var(--blue-soft);color:var(--blue)}
.badge-status.open::before,.badge-status.submitted::before,.badge-status.awaiting_user::before,.badge-status.ready_for_architect::before,.badge-status.pending::before{background:var(--blue)}
.badge-status.completed,.badge-status.verified,.badge-status.resolved,.badge-status.passed{background:var(--green-soft);color:var(--green)}
.badge-status.completed::before,.badge-status.verified::before,.badge-status.resolved::before,.badge-status.passed::before{background:var(--green)}
.badge-status.rejected,.badge-status.failed,.badge-status.critical{background:var(--red-soft);color:var(--red)}
.badge-status.rejected::before,.badge-status.failed::before,.badge-status.critical::before{background:var(--red)}
.badge-status.exemption_requested,.badge-status.exempted,.badge-status.medium{background:var(--amber-soft);color:var(--amber)}
.badge-status.exemption_requested::before,.badge-status.exempted::before,.badge-status.medium::before{background:var(--amber)}
.badge-status.low,.badge-status.info{background:var(--surface-2);color:var(--muted)}
.badge-status.low::before,.badge-status.info::before{background:var(--line-2)}
/* dimension badge: subtle with left accent */
.badge-dim{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:var(--radius-sm);font:500 .74rem/1.4 var(--mono);background:var(--surface-2);color:var(--muted)}
.badge-dim::before{content:"";width:6px;height:6px;border-radius:1px}
.badge-dim.style::before{background:var(--blue)}
.badge-dim.architecture::before{background:var(--violet)}
.badge-dim.performance::before{background:var(--amber)}
.badge-dim.security::before{background:var(--red)}
.badge-dim.maintainability::before{background:var(--teal)}
/* severity badge */
.badge-severity{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:var(--radius-sm);font:600 .74rem/1.4 var(--mono);background:var(--surface-2)}
.badge-severity.critical{color:var(--red)}.badge-severity.high{color:var(--amber)}.badge-severity.medium{color:var(--violet)}
.badge-severity.low,.badge-severity.info{color:var(--muted)}
.badge-severity::before{content:"";width:6px;height:6px;border-radius:50%}
.badge-severity.critical::before{background:var(--red)}.badge-severity.high::before{background:var(--amber)}.badge-severity.medium::before{background:var(--violet)}
.badge-severity.low::before,.badge-severity.info::before{background:var(--line-2)}
/* quality mini list */
.quality-mini{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.quality-mini span{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--muted)}
.quality-mini span::before{content:"";width:7px;height:7px;border-radius:50%}
.quality-mini .passed::before{background:var(--green)}.quality-mini .failed::before{background:var(--red)}.quality-mini .pending::before{background:var(--amber)}
@media(max-width:1024px){.board{grid-template-columns:1fr}.flow{flex-direction:column}.flow-arrow{display:none}}
@media(max-width:640px){.topbar{flex-direction:column;gap:14px}.meta{text-align:left}.stepper{overflow-x:auto}.stepper-line{display:none}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="badge" id="connBadge"><span>实时同步</span></div>
      <h1>编排进度看板</h1>
    </div>
    <div class="meta">
      <span>变更编号<strong id="changeId">-</strong></span>
      <span>基准分支<strong id="baseBranch">-</strong></span>
      <span>最后更新<strong id="updatedAt">-</strong></span>
    </div>
  </header>
  <nav class="group-strip" id="groupList"></nav>
  <main id="dashboard"></main>
</div>
<script>
const PHASES=[['task_analysis','需求分析','确认需求与方案'],['dev_impl','开发实施','按任务开发实现'],['review','审查','工具/任务/质量三层审查'],['completed','完成','所有阶段已通过']];
const TASK_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证'};
const ISSUE_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证',exemption_requested:'豁免申请',exempted:'已豁免'};
const BLOCKER_LABELS={reported:'已上报',awaiting_user:'等待用户',ready_for_architect:'等待架构复核',resolved:'已解决'};
const DIM_LABELS={style:'风格',architecture:'架构',performance:'性能',security:'安全',maintainability:'可维护'};
const DIM_COLOR={style:'var(--blue)',architecture:'var(--violet)',performance:'var(--amber)',security:'var(--red)',maintainability:'var(--teal)'};
const SEVERITY_LABELS={Critical:'严重',High:'高危',Medium:'中危',Low:'低危',Info:'提示'};
const SEVERITY_ORDER={Critical:0,High:1,Medium:2,Low:3,Info:4};
const mockState={
  active:true,changeId:'proto-001',baseBranch:'main',updatedAt:new Date().toISOString(),
  taskGroups:[
    {id:'tg-1',name:'用户登录',status:'dev_impl',lifecycle:'in_progress',reviewCompleted:false,branchName:'task-group/user-login',
     phases:{architect_review:{completed:true},review:{tool:{completed:false},task:{completed:false},quality:{progress:{style:'pending',architecture:'passed',performance:'pending',security:'failed',maintainability:'passed'}}}},
     tasks:[
       {id:'1',title:'登录接口',taskNumber:'1.1',specTrace:'spec.md',status:'open',rejectReason:null},
       {id:'2',title:'单元测试',taskNumber:'1.2',specTrace:'spec.md',status:'verified',rejectReason:null},
     ],
     issues:[
       {id:'10',dimension:'security',severity:'Critical',file:'Auth.java',line:12,description:'SQL 注入风险，需改用参数化查询。当前代码直接将用户输入拼接到 SQL 语句中，存在严重的安全漏洞，必须在入库前进行转义或使用预编译语句。',suggestion:'使用 PreparedStatement 或 ORM 参数化查询',status:'open',sourcePhase:'quality'},
       {id:'11',dimension:'style',severity:'Info',file:'Config.java',line:3,description:'命名风格不一致',status:'verified',sourcePhase:'tool'},
       {id:'12',dimension:'performance',severity:'High',file:'Login.java',line:45,description:'循环内重复查询数据库，建议批量处理或加缓存。',suggestion:'将循环内查询改为批量 IN 查询',status:'submitted',sourcePhase:'task'},
     ],
     blockers:[{id:'b1',taskId:'1',description:'依赖服务不可用',evidence:'HTTP 503，上游认证服务返回 Service Unavailable',status:'awaiting_user'}]
    },
    {id:'tg-2',name:'订单支付',status:'completed',lifecycle:'completed',reviewCompleted:true,branchName:'task-group/order-pay',
     phases:{architect_review:{completed:true},review:{tool:{completed:true},task:{completed:true},quality:{progress:{style:'passed',architecture:'passed',performance:'passed',security:'passed',maintainability:'passed'}}}},
     tasks:[{id:'3',title:'支付流程',taskNumber:'2.1',specTrace:'spec.md',status:'verified',rejectReason:null}],
     issues:[],blockers:[]
    }
  ]
};
let selectedGroupId=mockState.taskGroups[0].id;
const filters={task:{status:'all',keyword:''},issue:{status:'all',dimension:'all',severity:'all',keyword:''},blocker:{status:'all',keyword:''}};
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c]))}
function cls(v){return String(v??'').replace(/[^a-zA-Z0-9_-]/g,'_')}
function badgeStatus(value,label){return `<span class="badge-status ${cls(value)}">${esc(label||value)}</span>`}
function badgeDim(value,label){return `<span class="badge-dim ${cls(value)}">${esc(label||value)}</span>`}
function badgeSeverity(value,label){return `<span class="badge-severity ${cls(value)}">${esc(label||value)}</span>`}
function currentGroup(){return mockState.taskGroups.find(g=>g.id===selectedGroupId)||mockState.taskGroups[0]}
function phaseState(group,key,index){const current=PHASES.findIndex(p=>p[0]===group.status);if(key==='task_analysis')return group.phases.architect_review.completed?'done':current===index?'active':'pending';if(key==='dev_impl')return group.status==='review'||group.status==='completed'?'done':current===index?'active':'pending';if(key==='review')return group.reviewCompleted?'done':current===index?'active':'pending';return group.status==='completed'?'done':'pending'}
function renderGroups(){const el=document.getElementById('groupList');el.innerHTML=mockState.taskGroups.map(g=>`<button class="group-tab" data-gid="${esc(g.id)}" aria-selected="${g.id===selectedGroupId}"><span class="num">#${esc(g.id)}</span><span>${esc(g.name)}</span>${badgeStatus(g.lifecycle,g.status)}</button>`).join('')}
function renderStepper(group){return `<section class="stepper" aria-label="流程进度"><div class="stepper-line"></div>${PHASES.map(([k,l,d],i)=>{const s=phaseState(group,k,i);const icon=s==='done'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>':i+1;return `<div class="step ${s}"><div class="step-dot">${icon}</div><div><div class="step-label">${l}</div><div class="step-desc">${d}</div></div></div>`}).join('')}</section>`}
function renderReview(group){const r=group.phases.review;const qp=r.quality.progress;const total=Object.keys(qp).length;const passed=Object.values(qp).filter(v=>v==='passed').length;const failed=Object.values(qp).filter(v=>v==='failed').length;const pending=total-passed-failed;const qs=failed>0?'failed':pending>0?'pending':'passed';const flow=[
  {key:'tool',title:'Tool Review',desc:'自动化工具审查代码规范',status:r.tool.completed?'passed':'pending'},
  {key:'task',title:'Task Review',desc:'人工核对任务完成度',status:r.task.completed?'passed':'pending'},
  {key:'quality',title:'Quality Review',desc:'5 个质量维度逐项审查',status:qs}
];const qualityMini=Object.entries(qp).map(([d,v])=>`<span class="${v}">${DIM_LABELS[d]}</span>`).join('');return `<section class="review-section"><div class="review-head"><div><h2 class="review-title">审查阶段</h2><p class="review-sub">当前质量维度：${passed} 通过 / ${failed} 失败 / ${pending} 待审</p></div><div class="quality-summary ${qs}"><span class="dot"></span><span>${qs==='passed'?'所有门禁已通过':qs==='failed'?'存在未通过门禁':'门禁审查中'}</span></div></div><div class="flow">${flow.map((g,i)=>`<div class="flow-step ${g.status}"><div class="flow-icon">${g.status==='passed'?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>':g.status==='failed'?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 6l12 12M6 18L18 6"/></svg>':'●'}</div><div class="flow-body"><div class="flow-name">${g.title}</div><div class="flow-desc">${g.desc}</div></div></div>${i<flow.length-1?'<div class="flow-arrow">→</div>':''}`).join('')}</div><div class="quality-mini">${qualityMini}</div></section>`}
function filterPills(kind,items,activeKey,activeValue){return items.map(([k,v])=>`<button class="filter-pill ${activeValue===k?'active':''}" data-kind="${kind}" data-key="${activeKey}" data-value="${k}">${esc(v)}</button>`).join('')}
function renderFilters(kind){const f=filters[kind];let html=`<div class="filter-bar"><span class="filter-label">状态</span>${filterPills(kind,Object.entries(kind==='issue'?ISSUE_LABELS:kind==='blocker'?BLOCKER_LABELS:TASK_LABELS),'status',f.status)}`;
  if(kind==='issue'){html+=`<span class="filter-label">维度</span>${filterPills('issue',Object.entries(DIM_LABELS),'dimension',f.dimension)}<span class="filter-label">严重度</span>${filterPills('issue',Object.entries(SEVERITY_LABELS),'severity',f.severity)}`}
  html+=`<input type="text" data-kind="${kind}" data-key="keyword" placeholder="搜索…" value="${esc(f.keyword)}" style="padding:4px 10px;border:1px solid var(--line);border-radius:var(--pill);font-size:.78rem;min-width:120px;margin-left:auto">`;
  return html+'</div>'}
function panel(title,subtitle,count,controls,content){return `<section class="panel"><header class="panel-head"><div><h3>${title}</h3><p>${subtitle}</p></div><span class="count">${count}</span></header>${controls}<div class="panel-body">${content}</div></section>`}
function longText(label,text){if(!text||text.length<60)return esc(text);return `<div class="item-desc collapsed">${esc(text)}</div><button class="item-desc-toggle">展开</button>`}
function bindExpands(){document.querySelectorAll('.item-desc-toggle').forEach(btn=>btn.addEventListener('click',e=>{const d=e.target.previousElementSibling;d.classList.toggle('collapsed');e.target.textContent=d.classList.contains('collapsed')?'展开':'收起';}))}
function bindFilters(){document.querySelectorAll('.filter-pill').forEach(btn=>btn.addEventListener('click',e=>{const k=e.target.dataset.kind;const key=e.target.dataset.key;const v=e.target.dataset.value;filters[k][key]=v;render()}));document.querySelectorAll('.filter-bar input').forEach(el=>el.addEventListener('input',e=>{const k=e.target.dataset.kind;filters[k].keyword=e.target.value;render()}))}
function renderTasks(tasks){const f=filters.task;const filtered=tasks.filter(t=>f.status==='all'||t.status===f.status).filter(t=>!f.keyword||t.title.toLowerCase().includes(f.keyword.toLowerCase()));return panel('Task','实施任务',filtered.length,renderFilters('task'),filtered.length?filtered.map(t=>`<article class="item"><div class="item-top"><span class="item-id">#${esc(t.id)} · ${esc(t.taskNumber)}</span>${badgeStatus(t.status,TASK_LABELS[t.status])}</div><div class="item-title">${esc(t.title)}</div><div class="item-desc">${esc(t.specTrace||'无 Spec 溯源')}${t.rejectReason?' · 驳回：'+esc(t.rejectReason):''}</div></article>`).join(''):'<div class="empty">无 Task</div>')}
function renderIssues(issues){const f=filters.issue;let filtered=[...issues].sort((a,b)=>SEVERITY_ORDER[a.severity]-SEVERITY_ORDER[b.severity]);if(f.status!=='all')filtered=filtered.filter(i=>i.status===f.status);if(f.dimension!=='all')filtered=filtered.filter(i=>i.dimension===f.dimension);if(f.severity!=='all')filtered=filtered.filter(i=>i.severity===f.severity);if(f.keyword)filtered=filtered.filter(i=>i.description.toLowerCase().includes(f.keyword.toLowerCase()));return panel('Issue','审查发现',filtered.length,renderFilters('issue'),filtered.length?filtered.map(i=>`<article class="item"><div class="item-top"><span class="item-id">#${esc(i.id)} · ${esc(i.file)}${i.line?':'+i.line:''}</span>${badgeStatus(i.status,ISSUE_LABELS[i.status])}</div><div class="item-title">${esc(i.description)}</div>${longText('建议',i.suggestion)}<div class="item-meta">${badgeSeverity(String(i.severity).toLowerCase(),SEVERITY_LABELS[i.severity]||i.severity)}${badgeDim(i.dimension,DIM_LABELS[i.dimension]||i.dimension)}${badgeStatus(i.sourcePhase,i.sourcePhase)}</div></article>`).join(''):'<div class="empty">无 Issue</div>')}
function renderBlockers(blockers){const f=filters.blocker;let filtered=blockers;if(f.status!=='all')filtered=filtered.filter(b=>b.status===f.status);if(f.keyword)filtered=filtered.filter(b=>b.description.toLowerCase().includes(f.keyword.toLowerCase()));return panel('Blocker','待外部处理',filtered.length,renderFilters('blocker'),filtered.length?filtered.map(b=>`<article class="item"><div class="item-top"><span class="item-id">#${esc(b.id)}${b.taskId?' · TASK #'+esc(b.taskId):''}</span>${badgeStatus(b.status,BLOCKER_LABELS[b.status])}</div><div class="item-title">${esc(b.description)}</div>${longText('证据',b.evidence)}<div class="item-meta">${badgeStatus(b.status,b.status)}</div></article>`).join(''):'<div class="empty">无待处理 Blocker</div>')}
function render(){const g=currentGroup();document.getElementById('changeId').textContent=mockState.changeId;document.getElementById('baseBranch').textContent=mockState.baseBranch||'-';document.getElementById('updatedAt').textContent=mockState.updatedAt?new Date(mockState.updatedAt).toLocaleTimeString():'-';document.getElementById('dashboard').innerHTML=`${renderStepper(g)}${renderReview(g)}<section class="board">${renderTasks(g.tasks)}${renderIssues(g.issues)}${renderBlockers(g.blockers)}</section>`;bindExpands();bindFilters()}
renderGroups();render();
document.getElementById('groupList').addEventListener('click',e=>{const b=e.target.closest('[data-gid]');if(b){selectedGroupId=b.dataset.gid;renderGroups();render()}});
</script>
</body>
