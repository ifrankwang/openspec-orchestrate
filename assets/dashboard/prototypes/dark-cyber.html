<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编排进度看板 · 深色科技</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#05080f;--surface:#0b1020;--elevated:#11182c;
  --ink:#e2e8f0;--muted:#94a3b8;--quiet:#64748b;
  --line:#1e293b;--line-bright:#334155;
  --blue:#38bdf8;--blue-glow:rgba(56,189,248,.25);
  --green:#4ade80;--green-glow:rgba(74,222,128,.25);
  --amber:#facc15;--amber-glow:rgba(250,204,21,.25);
  --red:#f87171;--red-glow:rgba(248,113,113,.25);
  --violet:#c084fc;--violet-glow:rgba(192,132,252,.25);
  --radius:10px;--radius-sm:6px;
  --shadow:0 0 24px rgba(0,0,0,.45);
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box}html{font-size:15px}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);line-height:1.55;-webkit-font-smoothing:antialiased;background-image:radial-gradient(circle at 10% 20%,rgba(56,189,248,.08),transparent 25%),radial-gradient(circle at 90% 80%,rgba(192,132,252,.06),transparent 25%)}
button{font:inherit}button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.shell{max-width:1320px;margin:0 auto;padding:36px 28px 80px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding-bottom:28px;border-bottom:1px solid var(--line)}
.brand{display:flex;flex-direction:column;gap:10px}
.badge{display:inline-flex;align-items:center;gap:8px;font:600 .7rem/1 var(--font-mono);letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.badge::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
.badge.off::before{background:var(--red);box-shadow:0 0 10px var(--red)}
h1{margin:0;font-size:1.7rem;font-weight:600;letter-spacing:-.02em;text-shadow:0 0 16px var(--blue-glow)}
.meta{display:flex;gap:28px;text-align:right;font-size:.78rem;color:var(--muted)}
.meta span{display:flex;flex-direction:column;gap:5px}.meta strong{color:var(--ink);font-weight:500;font-size:.86rem;font-family:var(--font-mono)}
.group-strip{display:flex;gap:10px;overflow-x:auto;padding:22px 2px 26px}
.group-pill{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:10px 16px;border:1px solid var(--line);border-radius:999px;background:var(--surface);color:var(--muted);font-size:.82rem;cursor:pointer;transition:.15s ease}
.group-pill:hover{border-color:var(--blue);color:var(--ink);box-shadow:0 0 12px var(--blue-glow)}
.group-pill[aria-selected="true"]{border-color:var(--blue);background:linear-gradient(135deg,rgba(56,189,248,.15),transparent);color:#fff;box-shadow:0 0 16px var(--blue-glow)}
.group-pill .num{font-family:var(--font-mono);font-size:.72rem;opacity:.7}
.focus{display:grid;grid-template-columns:1fr auto;gap:32px;align-items:start;margin-bottom:32px}
.focus h2{margin:0;font-size:2.1rem;font-weight:600;letter-spacing:-.02em}
.focus .eyebrow{font:.72rem/1.4 var(--font-mono);color:var(--quiet);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.focus .branch{display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:7px 14px;background:var(--elevated);border:1px solid var(--line);border-radius:var(--radius-sm);font:.8rem var(--font-mono);color:var(--muted);box-shadow:var(--shadow)}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.metric{position:relative;padding:20px 22px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;min-width:130px}
.metric::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--violet));opacity:.7}
.metric-value{display:block;font:600 1.7rem/1 var(--font-mono);letter-spacing:-.02em;margin-bottom:6px}
.metric-label{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.stage{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stage-item{position:relative;padding:18px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow)}
.stage-item.active{border-color:var(--blue);box-shadow:0 0 20px var(--blue-glow),inset 0 0 20px rgba(56,189,248,.06)}
.stage-item.done{border-color:var(--green);box-shadow:0 0 16px var(--green-glow)}
.stage-name{display:block;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--quiet);margin-bottom:8px}
.stage-state{font-size:.95rem;font-weight:600}
.gates{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.gate{font:500 .68rem/1 var(--font-mono);padding:4px 8px;border-radius:4px;background:var(--elevated);border:1px solid var(--line)}
.gate.passed{background:rgba(74,222,128,.12);color:var(--green);border-color:rgba(74,222,128,.3);box-shadow:0 0 6px var(--green-glow)}
.gate.failed{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.3);box-shadow:0 0 6px var(--red-glow)}
.gate.pending{background:rgba(250,204,21,.12);color:var(--amber);border-color:rgba(250,204,21,.3)}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)}
.panel-head h3{margin:0;font-size:1rem;font-weight:600;color:var(--ink)}.panel-head p{margin:4px 0 0;font-size:.78rem;color:var(--quiet)}
.count{font:600 .8rem/1 var(--font-mono);padding:5px 12px;background:var(--elevated);border:1px solid var(--line);border-radius:999px;color:var(--muted)}
.panel-body{padding:12px 20px 20px;min-height:80px}
.empty{padding:30px 0;text-align:center;color:var(--quiet);font-size:.85rem}
.task,.item{padding:14px 0;border-bottom:1px solid var(--line)}
.task:last-child,.item:last-child{border-bottom:0}
.task-id{font:.74rem/1.4 var(--font-mono);color:var(--quiet);margin-bottom:6px}
.task-title{font-weight:500;margin-bottom:4px;color:var(--ink)}
.task-trace{font-size:.8rem;color:var(--muted);margin-bottom:10px}
.item-id{font:.74rem/1.5 var(--font-mono);color:var(--quiet);margin-bottom:6px}
.item-title{font-size:.9rem;font-weight:500;line-height:1.45;margin-bottom:10px;color:var(--ink)}
.item-note{font-size:.8rem;color:var(--muted);margin-bottom:8px}
.item-meta{display:flex;gap:6px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font:500 .72rem/1.4 var(--font-mono);border:1px solid transparent}
.tag.open,.tag.submitted,.tag.awaiting_user,.tag.ready_for_architect,.tag.pending{background:rgba(56,189,248,.12);color:var(--blue);border-color:rgba(56,189,248,.25)}
.tag.completed,.tag.verified,.tag.resolved,.tag.passed{background:rgba(74,222,128,.12);color:var(--green);border-color:rgba(74,222,128,.25)}
.tag.rejected,.tag.failed,.tag.critical{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.25)}
.tag.exemption_requested,.tag.exempted,.tag.medium{background:rgba(250,204,21,.12);color:var(--amber);border-color:rgba(250,204,21,.25)}
.tag.low,.tag.info{background:rgba(192,132,252,.12);color:var(--violet);border-color:rgba(192,132,252,.25)}
.review-detail{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:28px}
.review-card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.review-card h4{margin:0 0 10px;font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;color:var(--quiet)}
.review-card .big{font:600 1.15rem/1.2;margin-bottom:14px}
.quality-list{display:flex;flex-wrap:wrap;gap:6px}
@media(max-width:980px){.board{grid-template-columns:1fr}.review-detail{grid-template-columns:1fr}.stage{grid-template-columns:1fr}.focus{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){.topbar{flex-direction:column;gap:14px}.meta{text-align:left}.metrics{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="badge" id="connBadge"><span>实时同步</span></div>
      <h1>编排进度看板</h1>
    </div>
    <div class="meta">
      <span>变更编号<strong id="changeId">-</strong></span>
      <span>基准分支<strong id="baseBranch">-</strong></span>
      <span>最后更新<strong id="updatedAt">-</strong></span>
    </div>
  </header>
  <nav class="group-strip" id="groupList" aria-label="任务组"></nav>
  <main id="dashboard" aria-live="polite">
    <div class="empty">正在获取编排状态…</div>
  </main>
</div>
<script>
const PHASES=[['task_analysis','需求分析'],['dev_impl','开发实施'],['review','审查'],['completed','完成']];
const TASK_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证'};
const ISSUE_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证',exemption_requested:'豁免申请',exempted:'已豁免'};
const BLOCKER_LABELS={reported:'已上报',awaiting_user:'等待用户',ready_for_architect:'等待架构复核',resolved:'已解决'};
const DIM_LABELS={style:'风格',architecture:'架构',performance:'性能',security:'安全',maintainability:'可维护'};
const SEVERITY_LABELS={Critical:'严重',High:'高危',Medium:'中危',Low:'低危',Info:'提示'};
const SEVERITY_ORDER={Critical:0,High:1,Medium:2,Low:3,Info:4};
const mockState={
  active:true,changeId:'proto-001',baseBranch:'main',updatedAt:new Date().toISOString(),
  taskGroups:[
    {id:'tg-1',name:'用户登录',status:'dev_impl',lifecycle:'in_progress',reviewCompleted:false,branchName:'task-group/user-login',
     phases:{architect_review:{completed:true},review:{tool:{completed:false},task:{completed:false},quality:{progress:{style:'pending',architecture:'passed',performance:'pending',security:'failed',maintainability:'passed'}}}},
     tasks:[
       {id:'1',title:'登录接口',taskNumber:'1.1',specTrace:'spec.md',status:'open',rejectReason:null},
       {id:'2',title:'单元测试',taskNumber:'1.2',specTrace:'spec.md',status:'verified',rejectReason:null},
     ],
     issues:[
       {id:'10',dimension:'security',severity:'Critical',file:'Auth.java',line:12,description:'SQL 注入风险，需改用参数化查询',status:'open',sourcePhase:'quality'},
       {id:'11',dimension:'style',severity:'Info',file:'Config.java',line:3,description:'命名风格不一致',status:'verified',sourcePhase:'tool'},
     ],
     blockers:[{id:'b1',taskId:'1',description:'依赖服务不可用',evidence:'HTTP 503',status:'awaiting_user'}]
    },
    {id:'tg-2',name:'订单支付',status:'completed',lifecycle:'completed',reviewCompleted:true,branchName:'task-group/order-pay',
     phases:{architect_review:{completed:true},review:{tool:{completed:true},task:{completed:true},quality:{progress:{style:'passed',architecture:'passed',performance:'passed',security:'passed',maintainability:'passed'}}}},
     tasks:[{id:'3',title:'支付流程',taskNumber:'2.1',specTrace:'spec.md',status:'verified',rejectReason:null}],
     issues:[],blockers:[]
    }
  ]
};
let selectedGroupId=mockState.taskGroups[0].id;
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c]))}
function cls(v){return String(v??'').replace(/[^a-zA-Z0-9_-]/g,'_')}
function tag(value,label){return `<span class="tag ${cls(value)}">${esc(label||value)}</span>`}
function currentGroup(){return mockState.taskGroups.find(g=>g.id===selectedGroupId)||mockState.taskGroups[0]}
function phaseState(group,key,index){const current=PHASES.findIndex(p=>p[0]===group.status);if(key==='task_analysis')return group.phases.architect_review.completed?'done':current===index?'active':'pending';if(key==='dev_impl')return group.status==='review'||group.status==='completed'?'done':current===index?'active':'pending';if(key==='review')return group.reviewCompleted?'done':current===index?'active':'pending';return group.status==='completed'?'done':'pending'}
function renderGroups(){const el=document.getElementById('groupList');el.innerHTML=mockState.taskGroups.map(g=>`<button class="group-pill" data-gid="${esc(g.id)}" aria-selected="${g.id===selectedGroupId}"><span class="num">#${esc(g.id)}</span><span>${esc(g.name)}</span>${tag(g.lifecycle,g.status)}</button>`).join('')}
function renderStage(group){return `<section class="stage">${PHASES.map(([k,l],i)=>{const s=phaseState(group,k,i);let gates='';if(k==='review'){const r=group.phases.review;const q=Object.values(r.quality.progress);const qs=q.includes('failed')?'failed':q.every(v=>v==='passed')?'passed':'pending';gates=`<div class="gates"><span class="gate ${r.tool.completed?'passed':'pending'}">工具</span><span class="gate ${r.task.completed?'passed':'pending'}">任务</span><span class="gate ${qs}">质量</span></div>`}return `<div class="stage-item ${s}"><span class="stage-name">${l}</span><span class="stage-state">${s==='done'?'已完成':s==='active'?'进行中':'未开始'}</span>${gates}</div>`}).join('')}</section>`}
function renderReview(group){const r=group.phases.review;const q=Object.entries(r.quality.progress).map(([d,v])=>tag(v,DIM_LABELS[d])).join('');return `<section class="review-detail"><div class="review-card"><h4>Tool Review</h4><div class="big">${r.tool.completed?'已通过':'待审核'}</div>${tag(r.tool.completed?'passed':'pending',r.tool.completed?'通过':'待审')}</div><div class="review-card"><h4>Task Review</h4><div class="big">${r.task.completed?'已通过':'待审核'}</div>${tag(r.task.completed?'passed':'pending',r.task.completed?'通过':'待审')}</div><div class="review-card"><h4>Quality Review</h4><div class="big">5 维度</div><div class="quality-list">${q}</div></div></section>`}
function panel(title,subtitle,count,content){return `<section class="panel"><header class="panel-head"><div><h3>${title}</h3><p>${subtitle}</p></div><span class="count">${count}</span></header><div class="panel-body">${content}</div></section>`}
function renderTasks(tasks){return panel('Task','实施任务',tasks.length,tasks.length?tasks.map(t=>`<article class="task"><div class="task-id">#${esc(t.id)} · ${esc(t.taskNumber)}</div><div class="task-title">${esc(t.title)}</div><div class="task-trace">${esc(t.specTrace||'无 Spec 溯源')}${t.rejectReason?' · 驳回：'+esc(t.rejectReason):''}</div><div class="item-meta">${tag(t.status,TASK_LABELS[t.status])}</div></article>`).join(''):'<div class="empty">无 Task</div>')}
function renderIssues(issues){const sorted=[...issues].sort((a,b)=>SEVERITY_ORDER[a.severity]-SEVERITY_ORDER[b.severity]);return panel('Issue','审查发现',issues.length,sorted.length?sorted.map(i=>`<article class="item"><div class="item-id">#${esc(i.id)} · ${esc(i.file)}${i.line?':'+i.line:''}</div><div class="item-title">${esc(i.description)}</div><div class="item-meta">${tag(String(i.severity).toLowerCase(),SEVERITY_LABELS[i.severity]||i.severity)}${tag(i.dimension,DIM_LABELS[i.dimension]||i.dimension)}${tag(i.status,ISSUE_LABELS[i.status])}</div></article>`).join(''):'<div class="empty">无 Issue</div>')}
function renderBlockers(blockers){return panel('Blocker','待外部处理',blockers.length,blockers.length?blockers.map(b=>`<article class="item"><div class="item-id">#${esc(b.id)}${b.taskId?' · TASK #'+esc(b.taskId):''}</div><div class="item-title">${esc(b.description)}</div><div class="item-note">${esc(b.evidence)}</div><div class="item-meta">${tag(b.status,BLOCKER_LABELS[b.status])}</div></article>`).join(''):'<div class="empty">无待处理 Blocker</div>')}
function render(){const g=currentGroup();const tasks=g.tasks||[],issues=g.issues||[],blockers=g.blockers||[];const verified=tasks.filter(t=>t.status==='verified').length;const unresolved=issues.filter(i=>!['verified','exempted'].includes(i.status)).length;const waiting=blockers.filter(b=>b.status==='awaiting_user').length;document.getElementById('changeId').textContent=mockState.changeId;document.getElementById('baseBranch').textContent=mockState.baseBranch||'-';document.getElementById('updatedAt').textContent=mockState.updatedAt?new Date(mockState.updatedAt).toLocaleTimeString():'-';document.getElementById('dashboard').innerHTML=`<div class="focus"><div><div class="eyebrow">当前任务组 #${esc(g.id)} · ${esc(g.lifecycle)}</div><h2>${esc(g.name)}</h2><span class="branch">${esc(g.branchName||'尚未设置隔离分支')}</span></div><div class="metrics"><div class="metric"><span class="metric-value">${verified}/${tasks.length}</span><span class="metric-label">Task 已验证</span></div><div class="metric"><span class="metric-value">${unresolved}</span><span class="metric-label">待处理 Issue</span></div><div class="metric"><span class="metric-value">${waiting}</span><span class="metric-label">等待用户</span></div></div></div>${renderStage(g)}${renderReview(g)}<section class="board">${renderTasks(tasks)}${renderIssues(issues)}${renderBlockers(blockers)}</section>`}
renderGroups();render();
document.getElementById('groupList').addEventListener('click',e=>{const b=e.target.closest('[data-gid]');if(b){selectedGroupId=b.dataset.gid;renderGroups();render()}});
</script>
</body>
</html>
