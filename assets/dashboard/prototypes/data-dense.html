<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编排进度看板 · 数据密集</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#f1f5f9;--surface:#ffffff;--elevated:#ffffff;
  --ink:#0f172a;--muted:#475569;--quiet:#94a3b8;
  --line:#cbd5e1;--line-subtle:#e2e8f0;
  --blue:#1d4ed8;--blue-soft:#dbeafe;
  --green:#15803d;--green-soft:#dcfce7;
  --amber:#a16207;--amber-soft:#fef9c3;
  --red:#b91c1c;--red-soft:#fee2e2;
  --violet:#7c3aed;--violet-soft:#ede9fe;
  --radius:6px;--radius-sm:4px;
  --shadow:0 1px 2px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);
  --font-sans:'Fira Sans',system-ui,sans-serif;
  --font-mono:'Fira Code',ui-monospace,monospace;
}
*{box-sizing:border-box}html{font-size:14px}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);line-height:1.5;-webkit-font-smoothing:antialiased}
button{font:inherit}button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.shell{max-width:1440px;margin:0 auto;padding:22px 20px 60px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:20px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--line);box-shadow:var(--shadow);position:sticky;top:0;z-index:10}
.badge{display:inline-flex;align-items:center;gap:8px;font:600 .72rem/1 var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
h1{margin:0;font-size:1.1rem;font-weight:600}
.meta{display:flex;gap:20px;font-size:.78rem;color:var(--muted)}
.meta strong{color:var(--ink);font-weight:600;margin-left:4px;font-family:var(--font-mono)}
.group-strip{display:flex;gap:6px;overflow-x:auto;padding:12px 0;border-bottom:1px solid var(--line)}
.group-tab{flex:0 0 auto;padding:7px 14px;border:1px solid transparent;border-radius:var(--radius);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:.12s}
.group-tab:hover{background:var(--line-subtle)}
.group-tab[aria-selected="true"]{background:var(--blue);color:#fff;font-weight:600}
.group-tab .num{font-family:var(--font-mono);font-size:.7rem;opacity:.8;margin-right:4px}
.dashboard{display:grid;grid-template-columns:260px 1fr;gap:18px;margin-top:18px;align-items:start}
.sidebar{display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-head{padding:12px 14px;border-bottom:1px solid var(--line-subtle);font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.card-body{padding:14px}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line-subtle);font-size:.82rem}
.metric-row:last-child{border-bottom:0}
.metric-row strong{font-size:1.05rem;font-family:var(--font-mono)}
.stage-list{display:flex;flex-direction:column;gap:6px}
.stage-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line-subtle);border-radius:var(--radius);background:var(--bg)}
.stage-row.active{border-color:var(--blue);background:var(--blue-soft)}
.stage-row.done{border-color:var(--green);background:var(--green-soft)}
.stage-name{flex:1;font-size:.82rem}
.stage-badges{display:flex;gap:4px}
.gate{font:500 .65rem/1 var(--font-mono);padding:2px 6px;border-radius:3px;background:#fff;border:1px solid var(--line)}
.gate.passed{background:var(--green-soft);color:var(--green);border-color:transparent}
.gate.failed{background:var(--red-soft);color:var(--red);border-color:transparent}
.gate.pending{background:var(--amber-soft);color:var(--amber);border-color:transparent}
.main-area{display:flex;flex-direction:column;gap:18px}
.focus-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.focus-bar h2{margin:0;font-size:1.15rem;font-weight:600}
.focus-bar .branch{font:.78rem var(--font-mono);color:var(--muted)}
.table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--bg)}
.table-head h3{margin:0;font-size:.9rem;font-weight:600}.table-head .cnt{font:.72rem var(--font-mono);color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--line-subtle)}
th{font-weight:600;color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.03em;background:var(--bg)}
tr:last-child td{border-bottom:0}
.empty{padding:24px;text-align:center;color:var(--quiet);font-size:.85rem}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font:500 .7rem/1.4 var(--font-mono);white-space:nowrap}
.tag.open,.tag.submitted,.tag.awaiting_user,.tag.ready_for_architect,.tag.pending{background:var(--blue-soft);color:var(--blue)}
.tag.completed,.tag.verified,.tag.resolved,.tag.passed{background:var(--green-soft);color:var(--green)}
.tag.rejected,.tag.failed,.tag.critical{background:var(--red-soft);color:var(--red)}
.tag.exemption_requested,.tag.exempted,.tag.medium{background:var(--amber-soft);color:var(--amber)}
.tag.low,.tag.info{background:var(--violet-soft);color:var(--violet)}
.quality-dots{display:flex;gap:3px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line)}
.dot.passed{background:var(--green)}.dot.failed{background:var(--red)}.dot.pending{background:var(--amber)}
@media(max-width:960px){.dashboard{grid-template-columns:1fr}.sidebar{order:2}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="badge">编排进度看板</div>
    <h1>OpenSpec Orchestrate</h1>
    <div class="meta">
      <span>变更<strong id="changeId">-</strong></span>
      <span>分支<strong id="baseBranch">-</strong></span>
      <span>更新<strong id="updatedAt">-</strong></span>
    </div>
  </header>
  <nav class="group-strip" id="groupList"></nav>
  <div class="dashboard">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-area" id="mainArea"></main>
  </div>
</div>
<script>
const PHASES=[['task_analysis','需求分析'],['dev_impl','开发实施'],['review','审查'],['completed','完成']];
const TASK_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证'};
const ISSUE_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证',exemption_requested:'豁免申请',exempted:'已豁免'};
const BLOCKER_LABELS={reported:'已上报',awaiting_user:'等待用户',ready_for_architect:'等待架构复核',resolved:'已解决'};
const DIM_LABELS={style:'风格',architecture:'架构',performance:'性能',security:'安全',maintainability:'可维护'};
const SEVERITY_LABELS={Critical:'严重',High:'高危',Medium:'中危',Low:'低危',Info:'提示'};
const SEVERITY_ORDER={Critical:0,High:1,Medium:2,Low:3,Info:4};
const mockState={
  active:true,changeId:'proto-001',baseBranch:'main',updatedAt:new Date().toISOString(),
  taskGroups:[
    {id:'tg-1',name:'用户登录',status:'dev_impl',lifecycle:'in_progress',reviewCompleted:false,branchName:'task-group/user-login',
     phases:{architect_review:{completed:true},review:{tool:{completed:false},task:{completed:false},quality:{progress:{style:'pending',architecture:'passed',performance:'pending',security:'failed',maintainability:'passed'}}}},
     tasks:[
       {id:'1',title:'登录接口',taskNumber:'1.1',specTrace:'spec.md',status:'open',rejectReason:null},
       {id:'2',title:'单元测试',taskNumber:'1.2',specTrace:'spec.md',status:'verified',rejectReason:null},
     ],
     issues:[
       {id:'10',dimension:'security',severity:'Critical',file:'Auth.java',line:12,description:'SQL 注入风险，需改用参数化查询',status:'open',sourcePhase:'quality'},
       {id:'11',dimension:'style',severity:'Info',file:'Config.java',line:3,description:'命名风格不一致',status:'verified',sourcePhase:'tool'},
     ],
     blockers:[{id:'b1',taskId:'1',description:'依赖服务不可用',evidence:'HTTP 503',status:'awaiting_user'}]
    },
    {id:'tg-2',name:'订单支付',status:'completed',lifecycle:'completed',reviewCompleted:true,branchName:'task-group/order-pay',
     phases:{architect_review:{completed:true},review:{tool:{completed:true},task:{completed:true},quality:{progress:{style:'passed',architecture:'passed',performance:'passed',security:'passed',maintainability:'passed'}}}},
     tasks:[{id:'3',title:'支付流程',taskNumber:'2.1',specTrace:'spec.md',status:'verified',rejectReason:null}],
     issues:[],blockers:[]
    }
  ]
};
let selectedGroupId=mockState.taskGroups[0].id;
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c]))}
function cls(v){return String(v??'').replace(/[^a-zA-Z0-9_-]/g,'_')}
function tag(value,label){return `<span class="tag ${cls(value)}">${esc(label||value)}</span>`}
function currentGroup(){return mockState.taskGroups.find(g=>g.id===selectedGroupId)||mockState.taskGroups[0]}
function phaseState(group,key,index){const current=PHASES.findIndex(p=>p[0]===group.status);if(key==='task_analysis')return group.phases.architect_review.completed?'done':current===index?'active':'pending';if(key==='dev_impl')return group.status==='review'||group.status==='completed'?'done':current===index?'active':'pending';if(key==='review')return group.reviewCompleted?'done':current===index?'active':'pending';return group.status==='completed'?'done':'pending'}
function renderGroups(){const el=document.getElementById('groupList');el.innerHTML=mockState.taskGroups.map(g=>`<button class="group-tab" data-gid="${esc(g.id)}" aria-selected="${g.id===selectedGroupId}"><span class="num">#${esc(g.id)}</span>${esc(g.name)} ${tag(g.lifecycle,g.status)}</button>`).join('')}
function renderSidebar(g){const r=g.phases.review;const q=Object.entries(r.quality.progress).map(([d,v])=>`<div class="metric-row"><span>${DIM_LABELS[d]}</span><span>${tag(v,v)}</span></div>`).join('');const stageRows=PHASES.map(([k,l],i)=>{const s=phaseState(g,k,i);let badges='';if(k==='review'){const qv=Object.values(r.quality.progress);const qs=qv.includes('failed')?'failed':qv.every(v=>v==='passed')?'passed':'pending';badges=`<div class="stage-badges"><span class="gate ${r.tool.completed?'passed':'pending'}">工具</span><span class="gate ${r.task.completed?'passed':'pending'}">任务</span><span class="gate ${qs}">质量</span></div>`}return `<div class="stage-row ${s}"><span class="stage-name">${l}</span><span class="tag ${s==='done'?'passed':s==='active'?'pending':'open'}">${s==='done'?'完成':s==='active'?'进行':'未开始'}</span>${badges}</div>`}).join('');return `<div class="card"><div class="card-head">Metrics</div><div class="card-body"><div class="metric-row"><span>Task 已验证</span><strong>${g.tasks.filter(t=>t.status==='verified').length}/${g.tasks.length}</strong></div><div class="metric-row"><span>待处理 Issue</span><strong>${g.issues.filter(i=>!['verified','exempted'].includes(i.status)).length}</strong></div><div class="metric-row"><span>等待用户</span><strong>${g.blockers.filter(b=>b.status==='awaiting_user').length}</strong></div></div></div><div class="card"><div class="card-head">阶段</div><div class="card-body"><div class="stage-list">${stageRows}</div></div></div><div class="card"><div class="card-head">Quality Review</div><div class="card-body">${q}</div></div>`}
function renderTable(title,subtitle,count,headers,rows){return `<div class="table-wrap"><div class="table-head"><h3>${esc(title)} <span class="cnt">${esc(subtitle)}</span></h3><span class="cnt">${count}</span></div>${rows.length?`<table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table>`:'<div class="empty">无数据</div>'}</div>`}
function renderMain(g){const tasks=g.tasks||[],issues=g.issues||[],blockers=g.blockers||[];const taskRows=tasks.map(t=>`<tr><td>#${esc(t.id)}</td><td>${esc(t.title)}</td><td>${esc(t.taskNumber)}</td><td>${esc(t.specTrace||'-')}</td><td>${tag(t.status,TASK_LABELS[t.status])}</td></tr>`);const issueRows=[...issues].sort((a,b)=>SEVERITY_ORDER[a.severity]-SEVERITY_ORDER[b.severity]).map(i=>`<tr><td>#${esc(i.id)}</td><td>${esc(i.description)}</td><td>${esc(i.file)}${i.line?':'+i.line:''}</td><td>${tag(String(i.severity).toLowerCase(),SEVERITY_LABELS[i.severity]||i.severity)}</td><td>${tag(i.dimension,DIM_LABELS[i.dimension]||i.dimension)}</td><td>${tag(i.status,ISSUE_LABELS[i.status])}</td></tr>`);const blockerRows=blockers.map(b=>`<tr><td>#${esc(b.id)}</td><td>${esc(b.description)}</td><td>${esc(b.evidence)}</td><td>${b.taskId||'-'}</td><td>${tag(b.status,BLOCKER_LABELS[b.status])}</td></tr>`);return `<div class="focus-bar"><div><h2>${esc(g.name)}</h2><span class="branch">${esc(g.branchName||'尚未设置隔离分支')}</span></div><span class="tag ${g.lifecycle}">${g.lifecycle}</span></div>${renderTable('Task','实施任务',tasks.length,['ID','标题','编号','Spec','状态'],taskRows)}${renderTable('Issue','审查发现',issues.length,['ID','描述','位置','严重度','维度','状态'],issueRows)}${renderTable('Blocker','待外部处理',blockers.length,['ID','描述','证据','Task','状态'],blockerRows)}`}
function render(){const g=currentGroup();document.getElementById('changeId').textContent=mockState.changeId;document.getElementById('baseBranch').textContent=mockState.baseBranch||'-';document.getElementById('updatedAt').textContent=mockState.updatedAt?new Date(mockState.updatedAt).toLocaleTimeString():'-';document.getElementById('sidebar').innerHTML=renderSidebar(g);document.getElementById('mainArea').innerHTML=renderMain(g)}
renderGroups();render();
document.getElementById('groupList').addEventListener('click',e=>{const b=e.target.closest('[data-gid]');if(b){selectedGroupId=b.dataset.gid;renderGroups();render()}});
</script>
</body>
</html>
