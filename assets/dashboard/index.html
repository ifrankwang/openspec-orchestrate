<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编排进度看板 · 重设计 v9</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#f8fafc;--surface:#fff;--surface-2:#f1f5f9;
  --ink:#0f172a;--muted:#475569;--quiet:#94a3b8;
  --line:#e2e8f0;--line-2:#cbd5e1;
  --blue:#2563eb;--blue-soft:#eff6ff;
  --green:#16a34a;--green-soft:#f0fdf4;
  --amber:#d97706;--amber-soft:#fffbeb;
  --red:#dc2626;--red-soft:#fef2f2;
  --violet:#7c3aed;--violet-soft:#f5f3ff;
  --teal:#0d9488;--teal-soft:#f0fdfa;
  --radius:12px;--radius-sm:8px;--pill:999px;
  --shadow:0 1px 2px rgba(15,23,42,.04),0 6px 16px rgba(15,23,42,.04);
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}html{font-size:15px}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer}button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.shell{max-width:1280px;margin:0 auto;padding:32px 28px 80px}
/* header */
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding-bottom:26px;border-bottom:1px solid var(--line)}
.brand{display:flex;flex-direction:column;gap:8px}
.badge{display:inline-flex;align-items:center;gap:8px;font:600 .68rem/1 var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-soft)}
h1{margin:0;font-size:1.6rem;font-weight:700;letter-spacing:-.03em}
.meta{display:flex;gap:28px;text-align:right;font-size:.8rem;color:var(--muted)}
.meta span{display:flex;flex-direction:column;gap:5px}.meta strong{color:var(--ink);font-weight:600}
/* group tabs */
.group-strip{display:flex;gap:8px;overflow-x:auto;padding:20px 2px 24px}
.group-tab{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:10px 16px;border:1px solid var(--line);border-radius:var(--pill);background:var(--surface);color:var(--muted);font-size:.84rem;transition:.15s}
.group-tab:hover{border-color:var(--line-2);color:var(--ink)}
.group-tab[aria-selected="true"]{border-color:transparent;background:var(--ink);color:#fff;box-shadow:var(--shadow)}
.group-tab .num{font-family:var(--mono);font-size:.72rem;opacity:.7}
/* stepper */
.stepper{display:flex;align-items:flex-start;position:relative;padding:24px 20px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px}
.stepper-line{position:absolute;top:38px;left:80px;right:80px;height:3px;background:var(--line);border-radius:var(--pill);z-index:0}
.step{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:1;text-align:center}
.step-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:600 .8rem var(--mono);background:#fff;border:2px solid var(--line);color:var(--muted)}
.step.done .step-dot{background:var(--green);border-color:var(--green);color:#fff}
.step.active .step-dot{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 0 4px var(--blue-soft)}
.step-label{font-weight:700;font-size:.85rem}.step-desc{font-size:.75rem;color:var(--muted);max-width:130px;line-height:1.35}
/* review section (floating, shown on hover over review step) */
.stepper-wrapper{position:relative;margin-bottom:20px}
.review-section{position:absolute;top:calc(100% + 8px);left:0;width:auto;max-width:420px;min-width:240px;z-index:10;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px 18px;opacity:0;visibility:hidden;transform:translateY(-8px);transition:all .2s ease;pointer-events:none}
.review-section.visible{opacity:1;visibility:visible;transform:translateY(0);pointer-events:auto}
.review-section::before,.review-section::after{content:"";position:absolute;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:7px solid var(--line)}
.review-section::before{top:-7px;z-index:2}
.review-section::after{top:-6px;border-left-width:6px;border-right-width:6px;border-bottom-width:6px;border-bottom-color:var(--surface);z-index:3}
.review-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.review-title{margin:0;font-size:1.05rem;font-weight:700}
.review-status{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--pill);font-size:.8rem;font-weight:600;background:var(--surface-2)}
.review-status.passed{background:var(--green-soft);color:var(--green)}.review-status.failed{background:var(--red-soft);color:var(--red)}.review-status.pending{background:var(--amber-soft);color:var(--amber)}
.review-status::before{content:"";width:8px;height:8px;border-radius:50%;background:currentColor}
/* mini stepper for review gates */
.review-flow{display:flex;flex-direction:column;align-items:stretch;gap:0;position:relative;padding:10px 12px 10px 40px;background:var(--surface-2);border-radius:var(--radius);margin-bottom:12px;overflow-x:auto}
.review-flow::before{content:"";position:absolute;left:29px;top:26px;bottom:36px;width:2px;background:var(--line);border-radius:var(--pill)}
.review-flow-line{display:none}
.review-flow-step{display:flex;align-items:flex-start;gap:10px;padding:14px 0}
.review-flow-step.quality{flex-direction:row;align-items:flex-start;gap:10px}
.review-flow-main{display:flex;align-items:flex-start;gap:8px}
.review-flow-body{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
.review-flow-dot{position:relative;z-index:1;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid var(--line);color:var(--muted);font-size:.65rem;font-weight:700;margin-left:-20px;flex:0 0 auto}
.review-flow-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.review-flow-dot.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 0 3px var(--blue-soft)}
.review-flow-dot.failed{background:var(--red);border-color:var(--red);color:#fff}
.review-flow-dot.pending{background:#fff;border-color:var(--line-2);color:var(--muted)}
.review-flow-name{font-weight:600;font-size:.85rem;white-space:nowrap}
.review-flow-desc{font-size:.74rem;color:var(--muted);white-space:nowrap}
/* quality review dims under Quality Review step */
.quality-dims{display:flex;flex-wrap:wrap;gap:6px}
.quality-dim{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--pill);background:#fff;border:1px solid var(--line);font-size:.76rem}
.quality-dim .status-icon{width:12px;height:12px;display:inline-flex;align-items:center;justify-content:center;font-size:9px}
.quality-dim.passed .status-icon{color:var(--green)}.quality-dim.failed .status-icon{color:var(--red)}.quality-dim.pending .status-icon{color:var(--amber)}
/* boards */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:start}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
.panel-head h3{margin:0;font-size:1rem;font-weight:700}.panel-head p{margin:4px 0 0;font-size:.78rem;color:var(--muted)}
.count{font:600 .78rem/1 var(--mono);padding:4px 10px;background:var(--surface-2);border-radius:var(--pill);color:var(--muted)}
/* status stats in panel header */
.status-stats{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.status-stat{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--pill);background:var(--surface-2);border:1px solid var(--line);font-size:.76rem;color:var(--muted);cursor:pointer;transition:.15s}
.status-stat:hover{border-color:var(--line-2);color:var(--ink)}
.status-stat.active{background:var(--blue-soft);border-color:var(--blue);color:var(--blue)}
.status-stat .stat-count{font-family:var(--mono);font-weight:600}
/* list items */
.panel-body{max-height:540px;overflow:auto;padding:0 16px}
.empty{padding:28px 0;text-align:center;color:var(--quiet);font-size:.85rem}
.item{padding:14px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:0}
.item-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:6px}
.item-id{font:.72rem/1.5 var(--mono);color:var(--quiet);padding-top:3px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
.item-title{font-size:.94rem;font-weight:600;line-height:1.45;display:flex;align-items:flex-start;gap:8px}
.item-desc{font-size:.82rem;color:var(--muted);margin-top:6px;line-height:1.5}
.item-desc.collapsed{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-desc-toggle{margin-top:6px;font-size:.75rem;color:var(--blue);background:none;border:none;padding:0;cursor:pointer}
.item-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center}
/* status badge */
.badge-status{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:var(--pill);font:600 .74rem/1.4 var(--mono)}
.badge-status::before{content:"";width:6px;height:6px;border-radius:50%}
.badge-status.open,.badge-status.submitted,.badge-status.awaiting_user,.badge-status.ready_for_architect,.badge-status.pending{background:var(--blue-soft);color:var(--blue)}
.badge-status.open::before,.badge-status.submitted::before,.badge-status.awaiting_user::before,.badge-status.ready_for_architect::before,.badge-status.pending::before{background:var(--blue)}
.badge-status.completed,.badge-status.verified,.badge-status.resolved,.badge-status.passed{background:var(--green-soft);color:var(--green)}
.badge-status.completed::before,.badge-status.verified::before,.badge-status.resolved::before,.badge-status.passed::before{background:var(--green)}
.badge-status.rejected,.badge-status.failed,.badge-status.critical{background:var(--red-soft);color:var(--red)}
.badge-status.rejected::before,.badge-status.failed::before,.badge-status.critical::before{background:var(--red)}
.badge-status.exemption_requested,.badge-status.exempted,.badge-status.medium{background:var(--amber-soft);color:var(--amber)}
.badge-status.exemption_requested::before,.badge-status.exempted::before,.badge-status.medium::before{background:var(--amber)}
.badge-status.low,.badge-status.info{background:var(--surface-2);color:var(--muted)}
.badge-status.low::before,.badge-status.info::before{background:var(--line-2)}
/* category tag */
.tag-cat{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:var(--radius-sm);font:500 .74rem/1.4 var(--mono);background:var(--surface-2);color:var(--muted);border:1px solid var(--line)}
.tag-cat::before{content:"";width:6px;height:6px;border-radius:50%}
.tag-cat.style::before{background:var(--blue)}.tag-cat.architecture::before{background:var(--violet)}
.tag-cat.performance::before{background:var(--amber)}.tag-cat.security::before{background:var(--red)}.tag-cat.maintainability::before{background:var(--teal)}
/* severity chip */
.severity-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--radius-sm);font:700 .76rem/1.4 var(--mono);color:#fff;flex-shrink:0;margin-top:1px}
.severity-chip.critical{background:var(--red)}.severity-chip.high{background:var(--amber)}.severity-chip.medium{background:var(--violet)}
.severity-chip.low,.severity-chip.info{background:var(--line-2);color:var(--ink)}
@media(max-width:1024px){.board{grid-template-columns:1fr}}
@media(max-width:640px){.topbar{flex-direction:column;gap:14px}.meta{text-align:left}.stepper{overflow-x:auto}.stepper-line{display:none}.review-flow{flex-direction:column;align-items:flex-start}.review-flow-line{display:none}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="badge" id="connBadge"><span>实时同步</span></div>
      <h1>编排进度看板</h1>
    </div>
    <div class="meta">
      <span>变更编号<strong id="changeId">-</strong></span>
      <span>基准分支<strong id="baseBranch">-</strong></span>
      <span>最后更新<strong id="updatedAt">-</strong></span>
    </div>
  </header>
  <nav class="group-strip" id="groupList"></nav>
  <main id="dashboard"></main>
</div>
<script>
const PHASES=[['task_analysis','需求分析','确认需求与方案'],['dev_impl','开发实施','按任务开发实现'],['review','审查','工具/任务/质量三层审查'],['completed','完成','所有阶段已通过']];
const TASK_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证'};
const ISSUE_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证',exemption_requested:'豁免申请',exempted:'已豁免'};
const BLOCKER_LABELS={awaiting_user:'等待用户',resolved:'已解决'};
const DIM_LABELS={style:'风格',architecture:'架构',performance:'性能',security:'安全',maintainability:'可维护'};
const SOURCE_LABELS={tool:'工具审查',task:'任务审查',quality:'质量审查'};
const SEVERITY_LABELS={Critical:'严重',High:'高危',Medium:'中危',Low:'低危',Info:'提示'};
const SEVERITY_ORDER={Critical:0,High:1,Medium:2,Low:3,Info:4};
let dashboardState={
  active:true,changeId:'proto-001',baseBranch:'main',updatedAt:new Date().toISOString(),
  taskGroups:[
    {id:'tg-1',name:'用户登录',status:'review',lifecycle:'in_progress',reviewCompleted:false,branchName:'task-group/user-login',
     phases:{architect_review:{completed:true},review:{tool:{completed:true},task:{completed:true},quality:{progress:{style:'pending',architecture:'passed',performance:'pending',security:'failed',maintainability:'passed'}}}},
     tasks:[
       {id:'1',title:'登录接口',taskNumber:'1.1',specTrace:'spec.md',status:'open',rejectReason:null},
       {id:'2',title:'单元测试',taskNumber:'1.2',specTrace:'spec.md',status:'verified',rejectReason:null},
     ],
     issues:[
       {id:'10',dimension:'security',severity:'Critical',file:'Auth.java',line:12,description:'SQL 注入风险，需改用参数化查询。当前代码直接将用户输入拼接到 SQL 语句中，存在严重的安全漏洞，必须在入库前进行转义或使用预编译语句。',suggestion:'使用 PreparedStatement 或 ORM 参数化查询',status:'open',sourcePhase:'quality'},
       {id:'11',dimension:'style',severity:'Info',file:'Config.java',line:3,description:'命名风格不一致',status:'verified',sourcePhase:'tool'},
       {id:'12',dimension:'performance',severity:'High',file:'Login.java',line:45,description:'循环内重复查询数据库，建议批量处理或加缓存。',suggestion:'将循环内查询改为批量 IN 查询',status:'submitted',sourcePhase:'task'},
     ],
     blockers:[{id:'b1',taskId:'1',description:'依赖服务不可用',evidence:'HTTP 503，上游认证服务返回 Service Unavailable',status:'awaiting_user'}]
    },
    {id:'tg-2',name:'订单支付',status:'completed',lifecycle:'completed',reviewCompleted:true,branchName:'task-group/order-pay',
     phases:{architect_review:{completed:true},review:{tool:{completed:true},task:{completed:true},quality:{progress:{style:'passed',architecture:'passed',performance:'passed',security:'passed',maintainability:'passed'}}}},
     tasks:[{id:'3',title:'支付流程',taskNumber:'2.1',specTrace:'spec.md',status:'verified',rejectReason:null}],
     issues:[],blockers:[]
    }
  ]
};
let selectedGroupId=dashboardState.taskGroups[0].id;
const filters={task:{status:'all'},issue:{status:'all'},blocker:{status:'all'}};
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c]))}
function cls(v){return String(v??'').replace(/[^a-zA-Z0-9_-]/g,'_')}
function badgeStatus(value,label){return `<span class="badge-status ${cls(value)}">${esc(label||value)}</span>`}
function tagCat(source,dim){const text=`${SOURCE_LABELS[source]||source} · ${DIM_LABELS[dim]||dim}`;return `<span class="tag-cat ${cls(dim)}">${esc(text)}</span>`}
function severityChip(sev){return `<span class="severity-chip ${cls(String(sev).toLowerCase())}">${SEVERITY_LABELS[sev]||sev}</span>`}
function currentGroup(){return dashboardState.taskGroups.find(g=>g.id===selectedGroupId)||dashboardState.taskGroups[0]}
function phaseState(group,key,index){const current=PHASES.findIndex(p=>p[0]===group.status);if(key==='task_analysis')return group.phases.architect_review.completed?'done':current===index?'active':'pending';if(key==='dev_impl')return group.status==='review'||group.status==='completed'?'done':current===index?'active':'pending';if(key==='review')return group.reviewCompleted?'done':current===index?'active':'pending';return group.status==='completed'?'done':'pending'}
function renderGroups(){const el=document.getElementById('groupList');el.innerHTML=dashboardState.taskGroups.map(g=>`<button class="group-tab" data-gid="${esc(g.id)}" aria-selected="${g.id===selectedGroupId}"><span class="num">#${esc(g.id)}</span><span>${esc(g.name)}</span>${badgeStatus(g.lifecycle,g.status)}</button>`).join('')}
function renderStepper(group){return `<section class="stepper" aria-label="流程进度"><div class="stepper-line"></div>${PHASES.map(([k,l,d],i)=>{const s=phaseState(group,k,i);const icon=s==='done'?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>':i+1;const idAttr=i===2?' id="reviewStep"':'';return `<div class="step ${s}"${idAttr}><div class="step-dot">${icon}</div><div><div class="step-label">${l}</div><div class="step-desc">${d}</div></div></div>`}).join('')}</section>`}
function reviewFlowDot(s){return s==='done'||s==='passed'?'<div class="review-flow-dot done"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></div>':s==='failed'?'<div class="review-flow-dot failed">✕</div>':'<div class="review-flow-dot pending">●</div>'}
function statusIcon(v){return v==='passed'?'<span class="status-icon">✓</span>':v==='failed'?'<span class="status-icon">✕</span>':'<span class="status-icon">●</span>'}
function renderReview(group){const r=group.phases.review;const qp=r.quality.progress;const failed=Object.values(qp).filter(v=>v==='failed').length;const pending=Object.values(qp).filter(v=>v==='pending').length;const qs=failed>0?'failed':pending>0?'pending':'passed';const toolStatus=r.tool.completed?'passed':'pending';const taskStatus=r.task.completed?'passed':'pending';const summaryText=qs==='passed'?'所有门禁已通过':qs==='failed'?'存在未通过门禁':'门禁审查中';return `<section class="review-section" id="reviewSection"><div class="review-head"><h2 class="review-title">审查阶段</h2><span class="review-status ${qs}">${summaryText}</span></div><div class="review-flow"><div class="review-flow-step">${reviewFlowDot(toolStatus)}<div><div class="review-flow-name">Tool Review</div></div></div><div class="review-flow-line"></div><div class="review-flow-step">${reviewFlowDot(taskStatus)}<div><div class="review-flow-name">Task Review</div></div></div><div class="review-flow-line"></div><div class="review-flow-step quality"><div class="review-flow-main">${reviewFlowDot(qs)}<div class="review-flow-body"><div class="review-flow-name">Quality Review</div><div class="quality-dims">${Object.entries(qp).map(([d,v])=>`<div class="quality-dim ${v}">${statusIcon(v)}<span>${DIM_LABELS[d]}</span></div>`).join('')}</div></div></div></div></div></section>`}
function renderStatusStats(kind,items,labels){const counts={};items.forEach(item=>{counts[item.status]=(counts[item.status]||0)+1});let html=`<div class="status-stats" data-kind="${kind}">`;for(const [k,label] of Object.entries(labels)){const count=counts[k]||0;html+=`<button class="status-stat ${filters[kind].status===k?'active':''}" data-kind="${kind}" data-status="${k}"><span>${esc(label)}</span><span class="stat-count">${count}</span></button>`}return html+'</div>'}
function panel(title,subtitle,count,stats,content){return `<section class="panel"><header class="panel-head"><div><h3>${title}</h3><p>${subtitle}</p>${stats}</div><span class="count">${count}</span></header><div class="panel-body">${content}</div></section>`}
function longText(text){if(!text||text.length<60)return esc(text);return `<div class="item-desc collapsed">${esc(text)}</div><button class="item-desc-toggle">展开</button>`}
function shortPath(file, line, maxLen){
  if(maxLen===undefined)maxLen=45;
  const suffix=line?':'+line:'';
  const full=esc(file)+suffix;
  if(full.length<=maxLen)return full;
  const p=file.split('/');
  if(p.length<=1)return full.slice(0,maxLen-3)+'...';
  const base=p[p.length-1];
  const parent=p[p.length-2];
  const tryTwo='.../'+esc(parent)+'/'+esc(base)+suffix;
  if(tryTwo.length<=maxLen)return tryTwo;
  const lastSeg=esc(base)+suffix;
  if(lastSeg.length<=maxLen)return lastSeg;
  return lastSeg.slice(0,maxLen-3)+'...';
}
function bindExpands(){document.querySelectorAll('.item-desc-toggle').forEach(btn=>btn.addEventListener('click',e=>{const d=e.target.previousElementSibling;d.classList.toggle('collapsed');e.target.textContent=d.classList.contains('collapsed')?'展开':'收起';}))}
function bindStatusStats(){document.querySelectorAll('.status-stat').forEach(btn=>btn.addEventListener('click',e=>{const s=e.target.closest('.status-stat');const k=s.dataset.kind;const st=s.dataset.status;filters[k].status=filters[k].status===st?'all':st;render()}))}
function bindReviewHover(){const reviewStep=document.getElementById('reviewStep');const reviewSection=document.getElementById('reviewSection');if(!reviewStep||!reviewSection)return;function position(){const wrap=reviewSection.parentElement.getBoundingClientRect();const step=reviewStep.getBoundingClientRect();const sec=reviewSection.getBoundingClientRect();let left=step.left+step.width/2-wrap.left-sec.width/2;left=Math.max(0,Math.min(left,wrap.width-sec.width));reviewSection.style.left=left+'px'}reviewStep.addEventListener('mouseenter',()=>{reviewSection.classList.add('visible');position()});reviewStep.addEventListener('mouseleave',()=>setTimeout(()=>{if(!reviewSection.matches(':hover'))reviewSection.classList.remove('visible')},50));reviewSection.addEventListener('mouseenter',()=>reviewSection.classList.add('visible'));reviewSection.addEventListener('mouseleave',()=>reviewSection.classList.remove('visible'));window.addEventListener('resize',position)}
function renderTasks(tasks){const f=filters.task;const filtered=tasks.filter(t=>f.status==='all'||t.status===f.status);const stats=renderStatusStats('task',tasks,TASK_LABELS);return panel('Task','实施任务',filtered.length,stats,filtered.length?filtered.map(t=>`<article class="item"><div class="item-top"><span class="item-id">#${esc(t.id)} · ${esc(t.taskNumber)}</span>${badgeStatus(t.status,TASK_LABELS[t.status])}</div><div class="item-title">${esc(t.title)}</div><div class="item-desc">${esc(t.specTrace||'无 Spec 溯源')}${t.rejectReason?' · 驳回：'+esc(t.rejectReason):''}</div></article>`).join(''):'<div class="empty">无 Task</div>')}
function renderIssues(issues){const f=filters.issue;let all=[...issues].sort((a,b)=>SEVERITY_ORDER[a.severity]-SEVERITY_ORDER[b.severity]);const filtered=all.filter(i=>f.status==='all'||i.status===f.status);const stats=renderStatusStats('issue',issues,ISSUE_LABELS);return panel('Issue','审查发现',filtered.length,stats,filtered.length?filtered.map(i=>`<article class="item"><div class="item-top"><span class="item-id" title="${esc(i.file)}${i.line?':'+i.line:''}">#${esc(i.id)} · ${shortPath(i.file,i.line)}</span>${badgeStatus(i.status,ISSUE_LABELS[i.status])}</div><div class="item-title">${severityChip(i.severity)}${esc(i.description)}</div>${longText(i.suggestion)}<div class="item-meta">${tagCat(i.sourcePhase,i.dimension)}</div></article>`).join(''):'<div class="empty">无 Issue</div>')}
function renderBlockers(blockers){const f=filters.blocker;const filtered=blockers.filter(b=>f.status==='all'||b.status===f.status);const stats=renderStatusStats('blocker',blockers,BLOCKER_LABELS);return panel('Blocker','待外部处理',filtered.length,stats,filtered.length?filtered.map(b=>`<article class="item"><div class="item-top"><span class="item-id">#${esc(b.id)}${b.taskId?' · TASK #'+esc(b.taskId):''}</span>${badgeStatus(b.status,BLOCKER_LABELS[b.status])}</div><div class="item-title">${esc(b.description)}</div>${longText(b.evidence)}</article>`).join(''):'<div class="empty">无待处理 Blocker</div>')}
function render(){const g=currentGroup();const showReview=g.status==='review'||g.status==='completed';document.getElementById('changeId').textContent=dashboardState.changeId;document.getElementById('baseBranch').textContent=dashboardState.baseBranch||'-';document.getElementById('updatedAt').textContent=dashboardState.updatedAt?new Date(dashboardState.updatedAt).toLocaleTimeString():'-';document.getElementById('dashboard').innerHTML=`<div class="stepper-wrapper">${renderStepper(g)}${showReview?renderReview(g):''}</div><section class="board">${renderTasks(g.tasks)}${renderIssues(g.issues)}${renderBlockers(g.blockers)}</section>`;bindExpands();bindStatusStats();bindReviewHover()}
async function loadState(){try{const res=await fetch('/api/state');if(!res.ok) throw new Error('fetch failed');const data=await res.json();if(data&&data.active===true){dashboardState=data;selectedGroupId=data.currentTaskGroupId||dashboardState.taskGroups[0]?.id;renderGroups();render()}}catch(e){console.error('[dashboard] load state failed',e)}}
renderGroups();render();
loadState();
document.getElementById('groupList').addEventListener('click',e=>{const b=e.target.closest('[data-gid]');if(b){selectedGroupId=b.dataset.gid;renderGroups();render()}});
</script>
</body>
</html>
