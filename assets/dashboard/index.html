<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>编排进度看板</title>
<style>
:root{color-scheme:light dark;--canvas:#f4f6f9;--surface:#fff;--line:#dbe2eb;--ink:#1c2736;--muted:#637287;--quiet:#8a98aa;--blue:#1767d1;--blue-wash:#eaf2ff;--green:#08794c;--green-wash:#dcf3e6;--amber:#946000;--amber-wash:#fff1d1;--red:#b92a43;--red-wash:#ffe5e9;--violet:#6749b9;--violet-wash:#eeeaff;--shadow:0 10px 30px rgba(29,47,74,.055);--sans:"Fira Sans","Noto Sans SC",system-ui,sans-serif;--mono:"SFMono-Regular","Cascadia Code","Roboto Mono",monospace}
@media(prefers-color-scheme:dark){:root{--canvas:#0d1520;--surface:#131f2d;--line:#2a3d55;--ink:#eff5fc;--muted:#aebdd0;--quiet:#7e90a8;--blue:#72adff;--blue-wash:#173c6d;--green:#54d49a;--green-wash:#113d2c;--amber:#f4c161;--amber-wash:#4c3611;--red:#ff8ca1;--red-wash:#51212c;--violet:#c8b4ff;--violet-wash:#35255d;--shadow:none}}
*{box-sizing:border-box}html{background:var(--canvas);color:var(--ink);font-size:15px}body{margin:0;min-width:320px;font-family:var(--sans);background:radial-gradient(ellipse 55rem 30rem at 50% -15rem,var(--blue-wash),transparent),var(--canvas)}button{font:inherit}button:focus-visible{outline:3px solid var(--blue);outline-offset:2px}.shell{max-width:1400px;margin:auto;padding:30px 24px 50px}.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;padding:0 2px 22px;border-bottom:1px solid var(--line)}.brand-line{display:flex;align-items:center;gap:8px;color:var(--muted);font:600 .7rem/1 var(--mono);letter-spacing:.1em;text-transform:uppercase}.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-wash)}h1{margin:9px 0 0;font-size:1.35rem;letter-spacing:-.045em}.session-meta{display:flex;gap:18px;align-items:flex-end;color:var(--muted);font:.72rem/1.35 var(--mono);text-align:right}.session-meta strong{display:block;color:var(--ink);font-size:.8rem;font-weight:600;margin-top:3px}.group-strip{display:flex;gap:7px;overflow-x:auto;padding:16px 1px 21px}.group-button{flex:0 0 auto;display:grid;grid-template-columns:auto auto;align-items:center;gap:6px;border:1px solid var(--line);border-radius:6px;background:var(--surface);color:var(--muted);padding:8px 10px;cursor:pointer;font-size:.76rem}.group-button:hover{border-color:var(--blue);color:var(--ink)}.group-button[aria-selected="true"]{border-color:var(--blue);background:var(--blue-wash);color:var(--ink);box-shadow:inset 0 -2px var(--blue)}.group-number{color:var(--quiet);font:.66rem/1 var(--mono)}.tag{display:inline-flex;align-items:center;justify-content:center;min-width:42px;border-radius:999px;padding:3px 6px;font:600 .65rem/1 var(--mono);white-space:nowrap}.tag.in_progress,.tag.open,.tag.submitted,.tag.awaiting_user,.tag.ready_for_architect,.tag.pending{background:var(--blue-wash);color:var(--blue)}.tag.completed,.tag.verified,.tag.resolved,.tag.passed{background:var(--green-wash);color:var(--green)}.tag.rejected,.tag.failed,.tag.critical,.tag.high{background:var(--red-wash);color:var(--red)}.tag.exemption_requested,.tag.reported,.tag.medium{background:var(--amber-wash);color:var(--amber)}.tag.exempted,.tag.low,.tag.info{background:var(--canvas);color:var(--muted);border:1px solid var(--line)}.focus{display:flex;align-items:flex-end;justify-content:space-between;gap:26px;padding:22px 24px;background:var(--surface);border:1px solid var(--line);border-radius:12px 12px 0 0;box-shadow:var(--shadow)}.eyebrow{color:var(--quiet);font:600 .67rem/1 var(--mono);letter-spacing:.12em;text-transform:uppercase}.focus h2{margin:8px 0 6px;font-size:clamp(1.55rem,3.2vw,2.35rem);letter-spacing:-.055em;line-height:1.08}.branch{margin:0;color:var(--muted);font:.76rem/1.5 var(--mono);word-break:break-all}.metrics{display:flex;align-items:stretch;flex:0 0 auto}.metric{min-width:82px;padding:0 14px;border-left:1px solid var(--line)}.metric:first-child{border:0}.metric-value{display:block;font:700 1.25rem/1 var(--mono);letter-spacing:-.07em}.metric-label{display:block;margin-top:5px;color:var(--muted);font-size:.68rem;white-space:nowrap}.stage{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));background:var(--surface);border:1px solid var(--line);border-top:0;border-radius:0 0 12px 12px;box-shadow:var(--shadow);overflow:hidden}.stage-item{position:relative;min-height:96px;padding:17px 18px;border-left:1px solid var(--line)}.stage-item:first-child{border:0}.stage-item::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--line)}.stage-item.done::before{background:var(--green)}.stage-item.active{background:var(--blue-wash)}.stage-item.active::before{background:var(--blue)}.stage-name{display:block;font:700 .78rem/1.2 var(--mono)}.stage-state{display:block;color:var(--muted);font-size:.73rem;margin-top:6px}.gates{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}.gate{padding:3px 4px;border-radius:3px;background:var(--canvas);color:var(--quiet);font:600 .61rem/1 var(--mono)}.gate.passed{background:var(--green-wash);color:var(--green)}.gate.failed{background:var(--red-wash);color:var(--red)}.board{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:16px;align-items:start}.panel{overflow:hidden;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}.panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:18px 18px 16px;border-bottom:1px solid var(--line)}.panel-head h3{font-size:1rem;margin:0}.panel-head p{margin:5px 0 0;color:var(--muted);font-size:.73rem}.count{display:inline-flex;align-items:center;justify-content:center;min-width:22px;border-radius:999px;padding:4px 7px;background:var(--canvas);border:1px solid var(--line);color:var(--muted);font:600 .67rem/1 var(--mono)}.task,.item{padding:14px 18px;border-bottom:1px solid var(--line)}.task:last-child,.item:last-child{border-bottom:0}.task{display:grid;grid-template-columns:55px minmax(0,1fr);gap:10px}.task-id{padding-top:2px;color:var(--quiet);font:.65rem/1.5 var(--mono)}.task-title,.item-title{font-size:.8rem;font-weight:600;line-height:1.45}.task-trace,.item-note{margin-top:5px;color:var(--muted);font:.67rem/1.45 var(--mono);word-break:break-all}.item-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.item-id{color:var(--quiet);font:.65rem/1.35 var(--mono);word-break:break-all}.item-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}.empty{padding:28px 18px;text-align:center;color:var(--muted);font-size:.8rem}.error{color:var(--red)}@media(max-width:1050px){.board{grid-template-columns:repeat(2,minmax(0,1fr))}.board .panel:last-child{grid-column:span 2}}@media(max-width:700px){.focus{align-items:flex-start;flex-direction:column}.metrics{width:100%}.metric{flex:1}.stage{grid-template-columns:repeat(2,minmax(0,1fr))}.stage-item:nth-child(3){border-left:0}.stage-item:nth-child(-n+2){border-bottom:1px solid var(--line)}.board{grid-template-columns:1fr}.board .panel:last-child{grid-column:auto}}@media(max-width:560px){.shell{padding:20px 14px 35px}.topbar{align-items:flex-start;flex-direction:column;gap:14px}.session-meta{text-align:left;gap:13px}.focus{padding:19px}.metrics{flex-wrap:wrap;gap:12px}.metric{flex:0 0 calc(50% - 6px);border:0;padding:0}.stage{grid-template-columns:1fr}.stage-item,.stage-item:nth-child(3){border-left:0;border-bottom:1px solid var(--line)}.stage-item:last-child{border-bottom:0}.task,.item{padding-left:16px;padding-right:16px}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
.review-detail{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));margin-top:16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}.review-lane{padding:16px 18px;border-left:1px solid var(--line)}.review-lane:first-child{border:0}.review-kicker{display:block;color:var(--quiet);font:600 .64rem/1 var(--mono);letter-spacing:.1em;text-transform:uppercase}.review-title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px;font-size:.82rem}.quality-verdicts{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}.quality-verdicts .tag{min-width:0}@media(max-width:700px){.review-detail{grid-template-columns:1fr}.review-lane{border-left:0;border-top:1px solid var(--line)}.review-lane:first-child{border-top:0}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar"><div><div class="brand-line"><span class="live-dot" id="liveDot"></span><span id="connectionLabel">同步状态</span></div><h1>编排进度看板</h1></div><div class="session-meta"><span>变更<strong id="changeId">加载中</strong></span><span>基准分支<strong id="baseBranch">-</strong></span><span>最后更新<strong id="updatedAt">-</strong></span></div></header>
  <nav class="group-strip" id="groupList" aria-label="任务组"></nav>
  <main id="dashboard" aria-live="polite"><div class="empty">正在获取编排状态...</div></main>
</div>
<script>
const PHASES=[['task_analysis','需求分析'],['dev_impl','开发实施'],['review','审查'],['completed','完成']];
const TASK_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证'};
const ISSUE_LABELS={open:'待处理',submitted:'待验证',rejected:'已驳回',verified:'已验证',exemption_requested:'豁免申请',exempted:'已豁免'};
const BLOCKER_LABELS={reported:'已上报',awaiting_user:'等待用户',ready_for_architect:'等待架构复核',resolved:'已解决'};
const DIM_LABELS={style:'风格',architecture:'架构',performance:'性能',security:'安全',maintainability:'可维护'};
const SEVERITY_LABELS={Critical:'严重',High:'高危',Medium:'中危',Low:'低危',Info:'提示'};
const SEVERITY_ORDER={Critical:0,High:1,Medium:2,Low:3,Info:4};
let state=null,selectedGroupId=null;
function esc(value){return String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));}
function cls(value){return String(value??'').replace(/[^a-zA-Z0-9_-]/g,'_');}
function tag(value,label){return '<span class="tag '+cls(value)+'">'+esc(label||value)+'</span>';}
function currentGroup(){return state?.taskGroups?.find(group=>group.id===selectedGroupId)||state?.taskGroups?.find(group=>group.id===state.currentTaskGroupId)||state?.taskGroups?.[0]||null;}
function reviewDone(group){return group.reviewCompleted;}
function phaseState(group,key,index){const current=PHASES.findIndex(phase=>phase[0]===group.status);if(key==='task_analysis')return group.phases.architect_review.completed?'done':current===index?'active':'pending';if(key==='dev_impl')return group.status==='review'||group.status==='completed'?'done':current===index?'active':'pending';if(key==='review')return reviewDone(group)?'done':current===index?'active':'pending';return group.status==='completed'?'done':'pending';}
function renderGroups(){const list=document.getElementById('groupList');if(!state?.taskGroups?.length){list.innerHTML='';return;}list.innerHTML=state.taskGroups.map(group=>'<button type="button" class="group-button" role="tab" aria-selected="'+(group.id===selectedGroupId)+'" data-group="'+esc(group.id)+'"><span class="group-number">#'+esc(group.id)+'</span><span>'+esc(group.name)+'</span>'+tag(group.lifecycle,group.status)+'</button>').join('');}
function renderStage(group){return '<section class="stage" aria-label="流程进度">'+PHASES.map(([key,label],index)=>{const status=phaseState(group,key,index);let gates='';if(key==='review'){const review=group.phases.review;const quality=Object.values(review.quality.progress);const qualityStatus=quality.includes('failed')?'failed':quality.every(value=>value==='passed')?'passed':'pending';gates='<div class="gates"><span class="gate '+(review.tool.completed?'passed':'')+'">工具</span><span class="gate '+(review.task.completed?'passed':'')+'">任务</span><span class="gate '+qualityStatus+'">质量</span></div>';}return '<div class="stage-item '+status+'"><span class="stage-name">'+label+'</span><span class="stage-state">'+(status==='done'?'已完成':status==='active'?'进行中':'未开始')+'</span>'+gates+'</div>';}).join('')+'</section>';}
function renderReviewDetails(group){const review=group.phases.review;const quality=Object.entries(review.quality.progress).map(([dimension,value])=>tag(value,DIM_LABELS[dimension]+' · '+(value==='passed'?'通过':value==='failed'?'失败':'待审'))).join('');return '<section class="review-detail" aria-label="审查阶段明细"><div class="review-lane"><span class="review-kicker">Review Stage 01</span><div class="review-title"><strong>Tool Review</strong>'+tag(review.tool.completed?'passed':'pending',review.tool.completed?'通过':'待审核')+'</div></div><div class="review-lane"><span class="review-kicker">Review Stage 02</span><div class="review-title"><strong>Task Review</strong>'+tag(review.task.completed?'passed':'pending',review.task.completed?'通过':'待审核')+'</div></div><div class="review-lane"><span class="review-kicker">Review Stage 03</span><div class="review-title"><strong>Quality Review</strong></div><div class="quality-verdicts">'+quality+'</div></div></section>';}
function panel(title,subtitle,count,content){return '<section class="panel"><header class="panel-head"><div><h3>'+title+'</h3><p>'+subtitle+'</p></div><span class="count">'+count+'</span></header>'+content+'</section>';}
function renderTasks(tasks){return panel('Task','实施任务',tasks.length,tasks.length?tasks.map(task=>'<article class="task"><div class="task-id">#'+esc(task.id)+'<br>'+esc(task.taskNumber)+'</div><div><div class="task-title">'+esc(task.title)+'</div><div class="task-trace">'+esc(task.specTrace||'无 Spec 溯源')+(task.rejectReason?' · 驳回：'+esc(task.rejectReason):'')+'</div><div class="item-meta">'+tag(task.status,TASK_LABELS[task.status])+'</div></div></article>').join(''):'<div class="empty">无 Task</div>');}
function renderIssues(issues){const sorted=[...issues].sort((left,right)=>(SEVERITY_ORDER[left.severity]??99)-(SEVERITY_ORDER[right.severity]??99));return panel('Issue','审查发现',issues.length,sorted.length?sorted.map(issue=>'<article class="item"><div class="item-top"><div class="item-id">#'+esc(issue.id)+' · '+esc(issue.file)+(issue.line?':'+esc(issue.line):'')+'</div>'+tag(issue.status,ISSUE_LABELS[issue.status])+'</div><div class="item-title">'+esc(issue.description)+'</div><div class="item-meta">'+tag(String(issue.severity).toLowerCase(),SEVERITY_LABELS[issue.severity]||issue.severity)+tag(issue.dimension,DIM_LABELS[issue.dimension]||issue.dimension)+tag(issue.sourcePhase,issue.sourcePhase)+'</div></article>').join(''):'<div class="empty">无 Issue</div>');}
function renderBlockers(blockers){return panel('Blocker','待外部处理',blockers.length,blockers.length?blockers.map(item=>'<article class="item"><div class="item-top"><div class="item-id">#'+esc(item.id)+(item.taskId?' · TASK #'+esc(item.taskId):'')+'</div>'+tag(item.status,BLOCKER_LABELS[item.status])+'</div><div class="item-title">'+esc(item.description)+'</div><div class="item-note">'+esc(item.evidence)+'</div></article>').join(''):'<div class="empty">无待处理 Blocker</div>');}
function render(group){const tasks=group.tasks||[],issues=group.issues||[],blockers=group.blockers||[];const verified=tasks.filter(task=>task.status==='verified').length;const unresolved=issues.filter(issue=>!['verified','exempted'].includes(issue.status)).length;const waiting=blockers.filter(item=>item.status==='awaiting_user').length;document.getElementById('changeId').textContent=state.changeId;document.getElementById('baseBranch').textContent=state.baseBranch||'-';document.getElementById('updatedAt').textContent=state.updatedAt?new Date(state.updatedAt).toLocaleTimeString():'-';document.getElementById('dashboard').innerHTML='<section class="focus"><div><div class="eyebrow">当前任务组 #'+esc(group.id)+' · '+esc(group.lifecycle)+'</div><h2>'+esc(group.name)+'</h2><p class="branch">'+esc(group.branchName||'尚未设置隔离分支')+'</p></div><div class="metrics"><div class="metric"><span class="metric-value">'+verified+'/'+tasks.length+'</span><span class="metric-label">Task 已验证</span></div><div class="metric"><span class="metric-value">'+unresolved+'</span><span class="metric-label">待处理 Issue</span></div><div class="metric"><span class="metric-value">'+waiting+'</span><span class="metric-label">等待用户</span></div></div></section>'+renderStage(group)+renderReviewDetails(group)+'<section class="board">'+renderTasks(tasks)+renderIssues(issues)+renderBlockers(blockers)+'</section>';}
function renderAll(){renderGroups();const group=currentGroup();if(!state?.active||!group){document.getElementById('dashboard').innerHTML='<div class="empty">暂无活跃编排会话</div>';return;}render(group);}
async function fetchState(){try{const response=await fetch('/api/state',{cache:'no-store'});if(!response.ok)throw new Error('HTTP '+response.status);state=await response.json();if(!selectedGroupId||!state.taskGroups?.some(group=>group.id===selectedGroupId))selectedGroupId=state.currentTaskGroupId;document.getElementById('connectionLabel').textContent='实时同步';document.getElementById('liveDot').style.background='var(--green)';renderAll();}catch{state=null;document.getElementById('connectionLabel').textContent='连接失败';document.getElementById('liveDot').style.background='var(--red)';document.getElementById('dashboard').innerHTML='<div class="empty error">无法读取编排状态。2 秒后重试。</div>';}}
document.addEventListener('click',event=>{const group=event.target.closest('[data-group]');if(group){selectedGroupId=group.dataset.group;renderAll();}});
fetchState();setInterval(fetchState,2000);
</script>
</body>
</html>
